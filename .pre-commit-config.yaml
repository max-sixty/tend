repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-check
        args: ["--fix"]
        files: ^generator/
      - id: ruff-format
        files: ^generator/
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.7.12
    hooks:
      - id: uv-lock
        args: [--directory, generator]
        files: ^generator/(pyproject\.toml|uv\.lock)$
  - repo: https://github.com/adhtruong/mirrors-typos
    rev: v1.42.0
    hooks:
      - id: typos
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
  # The composite actions' shared step bodies live in standalone scripts
  # (shared/steps/, proxy/) rather than inline `run:` blocks, so
  # actionlint's built-in shellcheck doesn't see them. Run shellcheck directly
  # to keep that coverage. -S warning matches actionlint's default severity.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["-S", "warning"]
        files: ^(shared/steps/.*\.sh|proxy/setup-sandbox\.sh)$
  - repo: local
    hooks:
      # The Claude Code slash-command preprocessor treats a backticked token
      # beginning with an exclamation mark as shell command substitution. Any
      # plugin skill file loaded by /review (or another slash command) that
      # contains this sequence crashes the session before any assistant turn
      # runs. Regressed twice already: #217 introduced, #234 fixed, #226
      # reintroduced, #243 fixed again. This guard rejects a third regression
      # at commit time. The check uses chr(33)+chr(96) so the script itself
      # is safe from the pattern it is searching for.
      - id: no-preprocessor-poison-in-skills
        name: forbid bang-backtick in plugin skill files
        language: system
        entry: python3
        args:
          - -c
          - |
            import pathlib, sys
            poison = chr(33) + chr(96)
            hits = [
                (str(p), i, line)
                for p in pathlib.Path("plugins").rglob("*.md")
                for i, line in enumerate(p.read_text().splitlines(), start=1)
                if poison in line
            ]
            for p, i, line in hits:
                print(f"{p}:{i}: {line}")
            if hits:
                print(
                    "\nERROR: bang-backtick sequence in plugin skill file. "
                    "The Claude Code slash-command preprocessor treats this "
                    "as command substitution and crashes the session. "
                    "See max-sixty/tend#234, #243, #244."
                )
                sys.exit(1)
        pass_filenames: false

      # install-tend ships from the marketplace into other repos, so its
      # skill cannot reference repo-internal paths like docs/. Files an
      # installing agent needs are mirrored into the skill's references/
      # dir, which ships inside the plugin subtree. This hook keeps the
      # mirror byte-identical to its canonical source and fails the commit
      # if it drifted (re-stage the synced file).
      - id: sync-install-tend-references
        name: sync install-tend references/ from canonical sources
        language: system
        entry: python3
        args:
          - -c
          - |
            import pathlib, sys

            refs = pathlib.Path(
                "plugins/install-tend/skills/install-tend/references"
            )
            # canonical source -> shipped mirror
            mirrors = {
                pathlib.Path("docs/tend.example.yaml"): refs / "tend.example.yaml",
            }
            stale = []
            for src, dst in mirrors.items():
                if not src.exists():
                    print(
                        f"ERROR: canonical source {src} is missing. A mirror "
                        "in install-tend references/ points at it; update the "
                        "sync-install-tend-references hook if the path moved."
                    )
                    sys.exit(1)
                want = src.read_text()
                if not dst.exists() or dst.read_text() != want:
                    dst.write_text(want)
                    stale.append(f"{dst} (synced from {src})")
            if stale:
                print("Updated install-tend mirrors; re-stage them:")
                for s in stale:
                    print(f"  {s}")
                sys.exit(1)
        pass_filenames: false

      # claude/action.yaml (default `claude` harness) and
      # claude-interactive/action.yaml run the same `claude` binary and are
      # meant to be swap-in compatible: the generator stamps whichever ref the
      # `harness:` config selects, emitting the same `with:` input block for
      # both — so a pinned default (claude_version) silently drifting between
      # the two breaks one harness. This guard fails the commit if the two
      # actions' input surfaces diverge: a different default on a shared input,
      # or an input present in one but not the other. If a divergence is ever
      # intentional, narrow this check rather than letting parity rot.
      - id: claude-action-input-parity
        name: claude action input defaults stay in sync
        language: python
        additional_dependencies: ["ruamel.yaml"]
        files: ^(claude/action\.yaml|claude-interactive/action\.yaml)$
        entry: python3
        args:
          - -c
          - |
            import sys
            from ruamel.yaml import YAML

            yaml = YAML(typ="safe")

            def inputs(path):
                return yaml.load(open(path)).get("inputs", {})

            a = inputs("claude/action.yaml")
            b = inputs("claude-interactive/action.yaml")

            problems = []
            only_a = sorted(set(a) - set(b))
            only_b = sorted(set(b) - set(a))
            for name in only_a:
                problems.append(f"input '{name}' is in claude/action.yaml but not claude-interactive/action.yaml")
            for name in only_b:
                problems.append(f"input '{name}' is in claude-interactive/action.yaml but not claude/action.yaml")
            for name in sorted(set(a) & set(b)):
                da, db = a[name].get("default"), b[name].get("default")
                if da != db:
                    problems.append(
                        f"input '{name}' default differs: "
                        f"claude/action.yaml={da!r} vs claude-interactive/action.yaml={db!r}"
                    )

            for p in problems:
                print(p)
            if problems:
                print(
                    "\nERROR: the two Claude actions' input surfaces drifted. "
                    "They run the same binary and must stay swap-in compatible "
                    "(see CLAUDE.md). Align the inputs above."
                )
                sys.exit(1)
        pass_filenames: false

      # The set of env names an adopter's `sandbox_env:` may NOT set lives in
      # two places: RESERVED_SANDBOX_ENV in generator/src/tend/config.py (fails
      # at `init`) and the `case "$name"` guard in proxy/setup-sandbox.sh
      # (re-checks a hand-edited workflow). The shell re-check is the actual
      # security boundary; if it drifts below the config set, an adopter's
      # sandbox_env can override a routing/credential var past it. Kept in sync
      # by comments alone this rots — this guard fails the commit if the two
      # sets diverge.
      - id: sandbox-env-reserved-parity
        name: reserved sandbox_env set stays in sync
        language: system
        files: ^(generator/src/tend/config\.py|proxy/setup-sandbox\.sh)$
        entry: python3
        args:
          - -c
          - |
            import re, sys

            py = open("generator/src/tend/config.py").read()
            block = re.search(r"RESERVED_SANDBOX_ENV = \{(.*?)\}", py, re.S).group(1)
            config_set = set(re.findall(r'"([^"]+)"', block))

            sh = open("proxy/setup-sandbox.sh").read()
            case = re.search(r'case "\$name" in\s*(.*?)\)', sh, re.S).group(1)
            case = case.replace("\\\n", "").replace("\n", "")
            shell_set = {n.strip() for n in case.split("|") if n.strip()}

            problems = []
            for name in sorted(config_set - shell_set):
                problems.append(f"'{name}' is reserved in config.py but NOT guarded in setup-sandbox.sh")
            for name in sorted(shell_set - config_set):
                problems.append(f"'{name}' is guarded in setup-sandbox.sh but NOT reserved in config.py")

            for p in problems:
                print(p)
            if problems:
                print(
                    "\nERROR: the reserved sandbox_env set drifted between "
                    "config.py and setup-sandbox.sh. The shell case is the "
                    "security boundary; keep the two aligned."
                )
                sys.exit(1)
        pass_filenames: false
