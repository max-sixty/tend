name: Tend (Claude interactive)
description: >-
  Tend's interactive-Claude harness: runs the official `claude` binary
  inside a PTY (via `script(1)`) instead of going through
  `claude-code-action` / `@anthropic-ai/claude-agent-sdk`. A Stop hook
  writes a sentinel file the supervisor watches for; on fire, the session
  is terminated cleanly. Motivation: Anthropic's June 15 2026 billing
  split puts the Agent SDK on a metered Agent-SDK credit pool, while
  interactive Claude Code stays on the flat Pro/Max subscription. Inputs
  overlap with `action.yaml`'s for the common ones (auth, prompt, model,
  bot_name, allowed_tools, system_prompt_append, show_full_output); inputs
  that only existed for the Agent-SDK harness (`use_sticky_comment`,
  `additional_permissions`, `allowed_bots`, `allowed_non_write_users`)
  are not accepted here.

inputs:
  github_token:
    required: true
    description: GitHub token for API access and pushing commits
  claude_code_oauth_token:
    required: false
    default: ""
    description: >-
      Claude Code OAuth token (Max/Team subscription, obtained via
      `claude setup-token`). One of claude_code_oauth_token or
      anthropic_api_key must be set.
  anthropic_api_key:
    required: false
    default: ""
    description: >-
      Anthropic API key from console.anthropic.com (billed per token).
      One of claude_code_oauth_token or anthropic_api_key must be set;
      claude_code_oauth_token takes precedence when both are present.
  bot_name:
    required: true
    description: GitHub username of the bot account
  prompt:
    required: true
    description: The prompt to send to Claude
  model:
    default: "opus"
    description: Claude model to use
  allowed_tools:
    default: "Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill"
    description: Comma-separated list of allowed tools
  system_prompt_append:
    default: ""
    description: >-
      Extra text appended to the computed system prompt (see action.yaml
      for the composition recipe; shared/system-prompt.md is the base).
  show_full_output:
    default: "true"
    description: Include the full Claude transcript in the workflow step summary.
  claude_version:
    default: "2.1.150"
    description: >-
      Version of the `claude` binary to install via
      `https://claude.ai/install.sh`. Matches the version
      claude-code-base-action installs today.
  timeout_seconds:
    default: "3600"
    description: >-
      Maximum time the supervised Claude session is allowed to run before
      the supervisor kills it. Defaults to 60 minutes — well above any
      single-turn skill we have today.
  mitmproxy_version:
    default: "12.2.1"
    description: >-
      Pinned `mitmproxy` version for the credential-injection proxy. Pinned
      so the uv download cache key is stable; bump to upgrade.

outputs:
  token_usage:
    description: >-
      JSON object with token usage parsed from the Claude Code session
      JSONL written under `~/.claude/projects/`. Shape matches
      `action.yaml`'s output for compatibility.
    value: ${{ steps.tokens.outputs.usage }}

runs:
  using: composite
  steps:
    # Preflight steps mirror action.yaml. Kept in lockstep so that swapping
    # `uses:` between the two actions is a true apples-to-apples swap.
    - name: Security preflight
      shell: bash
      run: |
        DEFAULT_BRANCH=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.default_branch')
        PROTECTED=$(gh api "repos/${GITHUB_REPOSITORY}/branches/${DEFAULT_BRANCH}" --jq '.protected')
        if [ "$PROTECTED" != "true" ]; then
          echo "::error::Default branch '${DEFAULT_BRANCH}' is NOT protected. Without branch protection, the bot can merge PRs without review. Add a branch protection rule or ruleset before using Tend. See docs/security-model.md in the Tend repo."
          exit 1
        fi
        echo "Security preflight passed: default branch '${DEFAULT_BRANCH}' is protected"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Rate limit preflight
      shell: bash
      run: |
        REPO="${GITHUB_REPOSITORY}"
        BOT="${{ inputs.bot_name }}"
        TWENTY_MIN_AGO=$(date -u -d '20 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
        TODAY=$(date -u +%Y-%m-%d)
        YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)
        SIX_DAYS_AGO=$(date -u -d '6 days ago' +%Y-%m-%d)

        RECENT_PRS=$(gh api "repos/$REPO/pulls?state=all&sort=created&direction=desc&per_page=30" \
          --jq "[.[] | select(.user.login == \"$BOT\" and .created_at > \"$TWENTY_MIN_AGO\")] | length" || echo 0)
        RECENT_ISSUES=$(gh api "repos/$REPO/issues?creator=$BOT&state=all&sort=created&direction=desc&per_page=30" \
          --jq "[.[] | select(.pull_request == null and .created_at > \"$TWENTY_MIN_AGO\")] | length" || echo 0)

        TODAY_POSTS=$(gh api "search/issues?q=author:${BOT}+repo:${REPO}+created:${TODAY}" \
          --jq '.total_count' || echo 0)
        PAST_POSTS=$(gh api "search/issues?q=author:${BOT}+repo:${REPO}+created:${SIX_DAYS_AGO}..${YESTERDAY}" \
          --jq '.total_count' || echo 0)
        SPIKE_LIMIT=$((10 + PAST_POSTS / 3))

        echo "Rate limit: burst=${RECENT_PRS} PRs, ${RECENT_ISSUES} issues (20min); today=${TODAY_POSTS} (limit: ${SPIKE_LIMIT})"

        ABORT=false
        if [ "$RECENT_PRS" -gt 10 ]; then
          echo "::error::Rate limit: bot created ${RECENT_PRS} PRs in the last 20 minutes (limit: 10)"
          ABORT=true
        fi
        if [ "$RECENT_ISSUES" -gt 10 ]; then
          echo "::error::Rate limit: bot created ${RECENT_ISSUES} issues in the last 20 minutes (limit: 10)"
          ABORT=true
        fi
        if [ "$TODAY_POSTS" -gt "$SPIKE_LIMIT" ]; then
          echo "::error::Rate limit: bot created ${TODAY_POSTS} items today, above spike limit of ${SPIKE_LIMIT} (baseline: ${PAST_POSTS} over past 6 days)"
          ABORT=true
        fi
        if [ "$ABORT" = true ]; then
          exit 1
        fi
        echo "Rate limit check passed"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Resolve bot ID
      id: bot
      shell: bash
      run: echo "id=$(gh api users/${{ inputs.bot_name }} --jq '.id')" >> "$GITHUB_OUTPUT"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Validate auth configured
      shell: bash
      run: |
        if [ -z "${{ inputs.claude_code_oauth_token }}" ] && [ -z "${{ inputs.anthropic_api_key }}" ]; then
          echo "::error::No Claude auth configured. Set either the CLAUDE_CODE_OAUTH_TOKEN secret (subscription-funded, via \`claude setup-token\`) or the ANTHROPIC_API_KEY secret (billed per token via console.anthropic.com)."
          exit 1
        fi

    - name: Ensure uv is available
      shell: bash
      run: |
        if command -v uvx >/dev/null 2>&1; then
          echo "uvx already available at $(command -v uvx)"
          exit 0
        fi
        curl -LsSf https://astral.sh/uv/install.sh | sh -s -- --quiet
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    # On a PR, the head checkout contains attacker-controlled files that
    # the CLI reads at startup BEFORE any permission gating — SessionStart
    # hooks, env-var overrides (NODE_OPTIONS, LD_PRELOAD, PATH), MCP
    # servers, apiKeyHelper shell commands. Restore from the PR base
    # branch, which a maintainer has reviewed and merged.
    #
    # Path list and ordering mirror claude-code-action's restore-config.ts
    # (src/github/operations/restore-config.ts). Snapshot PR-authored
    # versions to .claude-pr/ first (excluded from git via info/exclude)
    # so review skills can optionally inspect what the PR changed without
    # those files ever being executed. Then delete (so an attacker-
    # controlled .gitmodules can't stall the fetch on credential prompts),
    # then fetch base, then check out each path, then unstage so the
    # revert doesn't silently leak into commits Claude makes later.
    #
    # Known limitation: a PR that legitimately edits .claude/ or CLAUDE.md
    # will have those edits reverted for the duration of this run. Same
    # tradeoff claude-code-action makes — narrow UX cost for closing the
    # RCE surface.
    - name: Restore sensitive config from base branch (PRs)
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        SENSITIVE=(.claude .mcp.json .claude.json .gitmodules .ripgreprc CLAUDE.md CLAUDE.local.md .husky)

        case "$GITHUB_EVENT_NAME" in
          pull_request_target|pull_request_review|pull_request_review_comment)
            BASE_REF=$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")
            ;;
          issue_comment)
            PR_URL=$(jq -r '.issue.pull_request.url // empty' "$GITHUB_EVENT_PATH")
            if [ -z "$PR_URL" ]; then
              echo "issue_comment on issue (not PR); nothing to restore"
              exit 0
            fi
            BASE_REF=$(gh api "${PR_URL#https://api.github.com/}" --jq '.base.ref')
            ;;
          *)
            echo "Event $GITHUB_EVENT_NAME is not a PR event; nothing to restore"
            exit 0
            ;;
        esac

        if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "null" ]; then
          echo "::warning::Could not determine base ref; skipping config restoration"
          exit 0
        fi

        echo "Restoring ${SENSITIVE[*]} from origin/$BASE_REF"

        # Snapshot PR-authored versions to .claude-pr/ for optional review
        rm -rf .claude-pr
        for p in "${SENSITIVE[@]}"; do
          if [ -e "$p" ]; then
            mkdir -p ".claude-pr/$(dirname "$p")"
            cp -aL "$p" ".claude-pr/$p" 2>/dev/null || true
          fi
        done
        if [ -d .claude-pr ]; then
          EXCLUDE_FILE="$(git rev-parse --git-path info/exclude)"
          mkdir -p "$(dirname "$EXCLUDE_FILE")"
          if ! grep -qxF '/.claude-pr/' "$EXCLUDE_FILE" 2>/dev/null; then
            [ -s "$EXCLUDE_FILE" ] && [ "$(tail -c1 "$EXCLUDE_FILE" | wc -l)" -eq 0 ] && echo "" >> "$EXCLUDE_FILE"
            echo '/.claude-pr/' >> "$EXCLUDE_FILE"
          fi
        fi

        # Delete BEFORE fetch so attacker-controlled .gitmodules can't stall on
        # credential prompts (git's default fetch.recurseSubmodules=on-demand).
        for p in "${SENSITIVE[@]}"; do
          rm -rf "$p"
        done

        git fetch origin "$BASE_REF" --depth=1 --no-recurse-submodules

        for p in "${SENSITIVE[@]}"; do
          git checkout "origin/$BASE_REF" -- "$p" 2>/dev/null || true
        done

        # Unstage — `git checkout <ref> -- <path>` stages restored files.
        git reset -- "${SENSITIVE[@]}" 2>/dev/null || true

        echo "Restored from origin/$BASE_REF"

    # Compose the system prompt from shared/system-prompt.md (harness-neutral)
    # plus a Claude-specific skill-loading directive. Same recipe as
    # action.yaml; the only difference is the relative path to shared/,
    # since this action lives under interactive/ (one level deeper).
    - name: Compose system prompt
      id: prompt
      shell: bash
      env:
        BOT_NAME: ${{ inputs.bot_name }}
        EXTRA: ${{ inputs.system_prompt_append }}
      run: |
        SHARED="${{ github.action_path }}/../shared/system-prompt.md"
        CLAUDE_DIRECTIVE="Use /tend-ci-runner:running-in-ci before starting work."
        AUTONOMY_DIRECTIVE="You are running in CI; no human is available to answer questions. Never prompt for clarification or approval. When uncertain, make the best reasonable choice from the available evidence and proceed. Permissions are pre-approved; tool calls execute without confirmation."
        BASE=$(BOT_NAME="$BOT_NAME" envsubst '$BOT_NAME' < "$SHARED")
        FULL="${CLAUDE_DIRECTIVE}"$'\n\n'"${AUTONOMY_DIRECTIVE}"$'\n\n'"${BASE}"
        if [ -n "$EXTRA" ]; then
          FULL="${FULL}"$'\n\n'"${EXTRA}"
        fi
        {
          echo 'value<<TEND_EOF'
          printf '%s\n' "$FULL"
          echo 'TEND_EOF'
        } >> "$GITHUB_OUTPUT"

    # Credential isolation (gh/git): run the agent as a separate, non-sudo
    # `tend-sandbox` user while the bot PAT lives only in a local mitmproxy
    # that injects it into GitHub requests. The agent never holds the PAT —
    # not in its env, and not in .git/config (the setup script strips the
    # credential `actions/checkout` persists there). Claude's own auth
    # (OAuth / API key) is out of scope for this cut and still reaches the
    # agent's env. See proxy/setup-sandbox.sh and proxy/github_auth.py.
    #
    # Runs after "Restore sensitive config" (which needs the persisted git
    # credential for its base fetch) and before the claude lifecycle, which
    # from here on executes as the sandbox user.
    # Cache the proxy's mitmproxy download (a sizeable dependency) in an
    # isolated uv cache dir, keyed on the pinned version. First run populates;
    # every run after restores in seconds instead of a cold ~20s resolve. The
    # agent's own uvx usage keeps its default cache, untouched.
    - name: Cache mitmproxy
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/tend-mitmproxy-uv
        key: tend-mitmproxy-${{ runner.os }}-${{ inputs.mitmproxy_version }}

    - name: Set up credential-isolation sandbox
      shell: bash
      env:
        TEND_GH_TOKEN: ${{ inputs.github_token }}
        ACTION_PATH: ${{ github.action_path }}
        MITMPROXY_VERSION: ${{ inputs.mitmproxy_version }}
        UV_CACHE_DIR: ${{ runner.temp }}/tend-mitmproxy-uv
      run: bash "${{ github.action_path }}/proxy/setup-sandbox.sh"

    # Install the claude binary. Same recipe and pinned version as
    # claude-code-base-action's install step.
    - name: Install Claude Code
      shell: bash
      env:
        CLAUDE_VERSION: ${{ inputs.claude_version }}
      run: |
        # `set -o pipefail` inside the bash -c subshell is required: without it
        # a curl failure (e.g. a 403 from the claude.ai CDN) passes empty
        # stdin to the downstream `bash -s --`, which exits 0, so the if
        # branch succeeds and the loop breaks after one attempt without
        # actually retrying.
        for i in 1 2 3; do
          if timeout 60 bash -c "set -o pipefail; curl -fsSL https://claude.ai/install.sh | bash -s -- $CLAUDE_VERSION"; then
            break
          fi
          echo "Install attempt $i failed; retrying"
          sleep $((i * 5))
        done
        if ! [ -x "$HOME/.local/bin/claude" ]; then
          echo "::error::claude binary not found at $HOME/.local/bin/claude after install"
          exit 1
        fi
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/claude" --version

    # Interactive `claude` runs first-run onboarding on a fresh install:
    # workspace-trust dialog, theme picker, then per-project onboarding.
    # `claude -p` skips them all automatically; interactive mode doesn't.
    # Pre-seed the state so the session reaches the prompt-processing
    # loop immediately. The first smoke test on a clean runner timed out
    # at the theme picker because only the workspace-trust seed was set.
    #
    # Keys (all live in ~/.claude.json):
    #   hasCompletedOnboarding=true, lastOnboardingVersion=<installed>
    #     → skips the welcome/theme/intro flow
    #   theme=dark
    #     → fallback in case onboarding still triggers
    #   projects[$PWD].hasTrustDialogAccepted=true
    #     → skips the workspace-trust dialog
    #   projects[$PWD].hasCompletedProjectOnboarding=true
    #     → skips the per-project "first time in this folder" prompt
    - name: Pre-seed Claude onboarding state
      shell: bash
      env:
        CLAUDE_VERSION: ${{ inputs.claude_version }}
      run: |
        PROJECT_PATH="$(realpath "$PWD")"
        if [ ! -f "$HOME/.claude.json" ]; then
          echo '{}' > "$HOME/.claude.json"
        fi
        jq --arg p "$PROJECT_PATH" --arg v "$CLAUDE_VERSION" '
          .hasCompletedOnboarding = true
          | .lastOnboardingVersion = $v
          | .theme = (.theme // "dark")
          | .projects[$p] = ((.projects[$p] // {}) + {
              hasTrustDialogAccepted: true,
              hasCompletedProjectOnboarding: true
            })
        ' "$HOME/.claude.json" > "$HOME/.claude.json.tmp"
        mv "$HOME/.claude.json.tmp" "$HOME/.claude.json"
        echo "Pre-seeded onboarding for $PROJECT_PATH (claude $CLAUDE_VERSION)"

    # Install the tend-ci-runner plugin from this action's own checkout —
    # same approach as action.yaml's `plugin_marketplaces:
    # ${{ github.action_path }}`. The plugin marketplace manifest at the
    # repo root (../.claude-plugin/marketplace.json relative to this
    # action) registers both plugins.
    - name: Install tend plugins
      shell: bash
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        # Suppress any interactive prompts (auth confirmation, plugin
        # install confirmation, etc.) the CLI might otherwise show.
        CLAUDE_CODE_REMOTE: "1"
      run: |
        MARKETPLACE_ROOT="$(realpath "${{ github.action_path }}/..")"
        claude plugin marketplace add "$MARKETPLACE_ROOT"
        claude plugin install install-tend@tend
        claude plugin install tend-ci-runner@tend
        claude plugin list 2>/dev/null || true

    # The claude binary, uv, plugins, and onboarding state were installed
    # into the runner's home by the steps above. Copy them into the sandbox
    # user's home so the agent — which runs as tend-sandbox from here — finds
    # its toolchain and config natively (no CLAUDE_CONFIG_DIR guesswork). cp -a,
    # not mv: the claude binary has absolute-path references into ~/.local/share,
    # so moving the originals out breaks it. (The cheaper fix — installing the
    # toolchain as the sandbox user directly — is a follow-up.) The bot PAT is in
    # none of these paths, so the copy carries no GitHub credential into the sandbox.
    - name: Hand off Claude toolchain to sandbox
      shell: bash
      run: |
        sudo mkdir -p "$AGENT_HOME/.local"
        sudo cp -a /home/runner/.local/bin "$AGENT_HOME/.local/bin"
        if [ -d /home/runner/.local/share ]; then
          sudo cp -a /home/runner/.local/share "$AGENT_HOME/.local/share"
        fi
        sudo cp -a /home/runner/.claude "$AGENT_HOME/.claude"
        sudo cp -a /home/runner/.claude.json "$AGENT_HOME/.claude.json"
        sudo chown -R "${SANDBOX}:${SANDBOX}" "$AGENT_HOME"
        sudo -u "$SANDBOX" "$AGENT_HOME/.local/bin/claude" --version

    # The supervisor pattern, in three pieces:
    #   1. .claude/settings.local.json sets `permissions.defaultMode:
    #      dontAsk` with a permissive allow list, plus Stop/StopFailure
    #      hooks. Stop writes a success sentinel; StopFailure writes a
    #      failure sentinel for API/rate-limit/auth errors. Adopter
    #      project settings still apply via the layered settings system.
    #      We avoid `--permission-mode bypassPermissions` because
    #      interactive claude shows a one-time "I accept the risks"
    #      disclaimer the first time bypass mode is entered, with no
    #      documented way to pre-seed acceptance — `dontAsk` + explicit
    #      allow is equivalent for CI's purposes.
    #   2. A wrapper script invokes `claude` with `--permission-mode
    #      dontAsk --allowedTools …` so all argv/env quoting happens in
    #      bash, not in nested YAML strings.
    #   3. `script(1)` allocates a PTY (GHA runners have no TTY by
    #      default; without this the Ink-based UI degrades or hangs).
    #      The supervisor polls for either sentinel, process exit, or the
    #      timeout, then cleanly terminates the session.
    - name: Run Claude
      id: claude
      shell: bash
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        # Tells claude this is a remote/non-interactive context so it
        # skips permission prompts that would otherwise block the
        # supervisor (interactive mode shows a one-time disclaimer the
        # first time bypass-permission tools are invoked). Belt-and-
        # suspenders alongside the settings.local.json dontAsk allow
        # list below.
        CLAUDE_CODE_REMOTE: "1"
        # Mirrors action.yaml: the Linux bwrap wrapping path corrupts `!`
        # to `\!` in Bash commands, so the sandbox stays off (`0`). The
        # sandbox would otherwise hide the model auth from the agent;
        # re-enable once the upstream bug lands. Reproduced through claude
        # 2.1.159; anthropics/claude-code#64301, write-up in #639.
        CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "0"
        # No GH_TOKEN/GITHUB_TOKEN here — the agent runs as the sandbox user
        # with only a dummy token; the real PAT lives in the proxy. With the
        # secrets gone from the agent's env, the SUBPROCESS_ENV_SCRUB=0
        # quoting workaround above no longer carries any credential cost.
        BOT_NAME: ${{ inputs.bot_name }}
        BOT_ID: ${{ steps.bot.outputs.id }}
        TEND_MODEL: ${{ inputs.model }}
        TEND_ALLOWED_TOOLS: ${{ inputs.allowed_tools }}
        TEND_SYSTEM_PROMPT: ${{ steps.prompt.outputs.value }}
        TEND_PROMPT: ${{ inputs.prompt }}
        TEND_TIMEOUT_SEC: ${{ inputs.timeout_seconds }}
      run: |
        set -u

        # Sentinels, PTY log, and wrapper live in the sandbox-writable run
        # dir ($TEND_RUN_DIR, created by setup-sandbox.sh) so the agent's
        # Stop hook — running as tend-sandbox — can touch the sentinels and
        # the runner-side supervisor can poll them.
        SENTINEL_OK="$TEND_RUN_DIR/tend-turn-done"
        SENTINEL_FAIL="$TEND_RUN_DIR/tend-turn-failed"
        LOG="$TEND_RUN_DIR/tend-claude.log"
        WRAPPER="$TEND_RUN_DIR/tend-run-claude.sh"
        sudo -u "$SANDBOX" rm -f "$SENTINEL_OK" "$SENTINEL_FAIL" "$LOG"

        # Build the permissions allow list from the comma-separated
        # `allowed_tools` input. defaultMode=dontAsk means anything not
        # explicitly allowed is denied (no interactive prompt). For tools
        # like Bash with no `(...)` suffix, the entry matches all
        # invocations — semantically equivalent to bypassPermissions for
        # the listed tools.
        ALLOW_JSON=$(jq -nc --arg list "$TEND_ALLOWED_TOOLS" '$list | split(",") | map(. | gsub("^\\s+|\\s+$"; ""))')

        # Build settings.local.json with jq, not a heredoc — jq escapes the
        # (adopter-controlled) tool list and the sentinel paths, so nothing in
        # them is re-expanded by the shell. @sh quotes the paths for the hook's
        # shell command. Settings and wrapper are written into sandbox-owned
        # locations as the sandbox user; the `< file` redirect is opened by the
        # runner shell, so tee needs no read access to the runner temp file.
        jq -nc \
          --argjson allow "$ALLOW_JSON" \
          --arg ok "$SENTINEL_OK" \
          --arg fail "$SENTINEL_FAIL" \
          '{
            permissions: {defaultMode: "dontAsk", allow: $allow},
            hooks: {
              Stop:        [{matcher: "", hooks: [{type: "command", command: ("touch " + ($ok   | @sh))}]}],
              StopFailure: [{matcher: "", hooks: [{type: "command", command: ("touch " + ($fail | @sh))}]}]
            }
          }' > "$RUNNER_TEMP/tend-settings.json"
        sudo -u "$SANDBOX" mkdir -p "$GITHUB_WORKSPACE/.claude"
        sudo -u "$SANDBOX" tee "$GITHUB_WORKSPACE/.claude/settings.local.json" \
          < "$RUNNER_TEMP/tend-settings.json" >/dev/null

        # Wrapper script — keeps the argv quoting in bash, not YAML. The
        # --permission-mode flag matches settings.local.json above; either
        # alone would suffice but specifying both is explicit and survives
        # an adopter who overrides settings.local.json.
        cat > "$RUNNER_TEMP/tend-wrapper.sh" <<'WRAPEOF'
        #!/usr/bin/env bash
        exec claude \
          --model "$TEND_MODEL" \
          --permission-mode dontAsk \
          --allowedTools "$TEND_ALLOWED_TOOLS" \
          --append-system-prompt "$TEND_SYSTEM_PROMPT" \
          "$TEND_PROMPT"
        WRAPEOF
        sudo -u "$SANDBOX" tee "$WRAPPER" < "$RUNNER_TEMP/tend-wrapper.sh" >/dev/null
        sudo -u "$SANDBOX" chmod +x "$WRAPPER"

        # Launch the agent as the non-sudo sandbox user. Its env carries a
        # DUMMY GitHub token (gh refuses to run without one); the proxy
        # replaces it with the real PAT for GitHub hosts only. HTTPS_PROXY
        # routes gh/git through the proxy; non-GitHub traffic tunnels through
        # untouched. The real PAT is in none of this env. script(1) allocates
        # the PTY (GHA runners have no TTY; without it the Ink UI hangs).
        #
        # The `sudo env VAR=...` form replaces the environment with only
        # what's listed, so the standard GitHub Actions context vars
        # (GITHUB_RUN_ID, GITHUB_REPOSITORY, GITHUB_WORKFLOW, …) must be
        # re-passed explicitly. They are public values, not secrets;
        # skills depend on them for run-self-reference (branch names,
        # gist headings, dedup of own check runs) and for owner-correct
        # URL construction. Without them, recipes like
        # `grep -qF "$GITHUB_RUN_ID"` short-circuit on an empty pattern
        # and skill-composed `github.com/$GITHUB_REPOSITORY/...` links
        # collapse to the wrong owner.
        DUMMY_GH_TOKEN="ghp_tendproxydummy000000000000000000000"
        sudo -u "$SANDBOX" env \
          HOME="$AGENT_HOME" \
          PATH="$AGENT_HOME/.local/bin:/usr/local/bin:/usr/bin:/bin" \
          HTTPS_PROXY="$PROXY_URL" HTTP_PROXY="$PROXY_URL" \
          https_proxy="$PROXY_URL" http_proxy="$PROXY_URL" \
          NO_PROXY="localhost,127.0.0.1" no_proxy="localhost,127.0.0.1" \
          GH_TOKEN="$DUMMY_GH_TOKEN" GITHUB_TOKEN="$DUMMY_GH_TOKEN" \
          CLAUDE_CODE_OAUTH_TOKEN="$CLAUDE_CODE_OAUTH_TOKEN" \
          ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
          CLAUDE_CODE_REMOTE="$CLAUDE_CODE_REMOTE" \
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB="$CLAUDE_CODE_SUBPROCESS_ENV_SCRUB" \
          BOT_NAME="$BOT_NAME" BOT_ID="$BOT_ID" \
          TEND_MODEL="$TEND_MODEL" TEND_ALLOWED_TOOLS="$TEND_ALLOWED_TOOLS" \
          TEND_SYSTEM_PROMPT="$TEND_SYSTEM_PROMPT" TEND_PROMPT="$TEND_PROMPT" \
          GITHUB_ACTIONS="$GITHUB_ACTIONS" CI="${CI:-true}" \
          GITHUB_RUN_ID="$GITHUB_RUN_ID" GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
          GITHUB_REPOSITORY="$GITHUB_REPOSITORY" GITHUB_REPOSITORY_OWNER="$GITHUB_REPOSITORY_OWNER" \
          GITHUB_WORKFLOW="$GITHUB_WORKFLOW" GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
          GITHUB_EVENT_NAME="$GITHUB_EVENT_NAME" GITHUB_SHA="$GITHUB_SHA" GITHUB_REF="$GITHUB_REF" \
          script -qefc "$WRAPPER" "$LOG" &
        CLAUDE_PID=$!
        echo "Claude PID: $CLAUDE_PID (running as $SANDBOX)"

        # Supervisor poll loop: success sentinel, failure sentinel,
        # process exit, or timeout — whichever comes first. The agent tree
        # runs as the sandbox user, so liveness/termination signals from the
        # runner cross the UID boundary and go through sudo.
        start=$(date +%s)
        status=running
        while true; do
          if [ -f "$SENTINEL_OK" ]; then
            status=ok
            break
          fi
          if [ -f "$SENTINEL_FAIL" ]; then
            status=stop-failure
            break
          fi
          if ! sudo kill -0 "$CLAUDE_PID" 2>/dev/null; then
            status=exited
            break
          fi
          if [ $(($(date +%s) - start)) -ge "$TEND_TIMEOUT_SEC" ]; then
            status=timeout
            break
          fi
          sleep 2
        done

        # Clean termination — SIGTERM, wait up to 5s, then SIGKILL. Killing the
        # `sudo` PID may leave the agent tree (script→claude→node) orphaned
        # since SIGKILL can't be relayed, so also reap every process owned by
        # the dedicated sandbox user.
        if sudo kill -0 "$CLAUDE_PID" 2>/dev/null; then
          sudo kill -TERM "$CLAUDE_PID" 2>/dev/null || true
          for _ in 1 2 3 4 5; do
            sleep 1
            sudo kill -0 "$CLAUDE_PID" 2>/dev/null || break
          done
          sudo kill -KILL "$CLAUDE_PID" 2>/dev/null || true
        fi
        sudo pkill -KILL -u "$SANDBOX" 2>/dev/null || true

        # Capture the real exit, but NOT via `|| true` — that would make
        # CLAUDE_EXIT always 0 (the exit of `true`) and report a crashed run as
        # success. The process is dead by now, so wait returns promptly.
        CLAUDE_EXIT=0
        wait "$CLAUDE_PID" 2>/dev/null || CLAUDE_EXIT=$?

        elapsed=$(($(date +%s) - start))
        echo "Supervisor: status=$status elapsed=${elapsed}s claude_exit=$CLAUDE_EXIT"
        echo "status=$status" >> "$GITHUB_OUTPUT"
        echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"

        if [ "${{ inputs.show_full_output }}" = "true" ] && [ -s "$LOG" ]; then
          {
            echo "## Claude transcript (last 200 lines, ANSI stripped)"
            echo
            echo '```'
            tail -200 "$LOG" | sed 's/\x1b\[[0-9;?]*[a-zA-Z]//g' | tr -d '\r'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        case "$status" in
          ok) exit 0 ;;
          stop-failure)
            echo "::error::Claude turn ended in failure (StopFailure hook fired — rate limit, auth, or server error)"
            exit 1
            ;;
          exited)
            echo "::error::Claude process exited before Stop hook fired (exit=$CLAUDE_EXIT)"
            exit "${CLAUDE_EXIT:-1}"
            ;;
          timeout)
            echo "::error::Claude session exceeded ${TEND_TIMEOUT_SEC}s timeout"
            exit 1
            ;;
        esac

    - name: Mark event notification read
      if: success()
      shell: bash
      run: |
        case "$GITHUB_EVENT_NAME" in
          pull_request_target|pull_request_review|pull_request_review_comment)
            NUM=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
            SUBJECT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${NUM}"
            ;;
          issue_comment)
            NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            if [ "$(jq -r '.issue.pull_request.url // empty' "$GITHUB_EVENT_PATH")" != "" ]; then
              SUBJECT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${NUM}"
            else
              SUBJECT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${NUM}"
            fi
            ;;
          issues)
            NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            SUBJECT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${NUM}"
            ;;
          *)
            exit 0
            ;;
        esac

        RUN_STARTED_AT=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          --jq '.run_started_at')

        (gh api notifications \
          | jq -r --arg url "$SUBJECT_URL" --arg started "$RUN_STARTED_AT" \
              '.[] | select(.subject.url == $url and .updated_at <= $started) | .id' \
          | while read -r tid; do
              [ -n "$tid" ] || continue
              gh api "notifications/threads/$tid" -X PATCH || true
            done) || echo "::warning::Failed to mark notification as read (non-fatal)"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Append skill step summary
      if: always()
      shell: bash
      run: |
        if [ -f /tmp/claude/step-summary.md ]; then
          cat /tmp/claude/step-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
        fi

    # Parse the session JSONL Claude Code writes under
    # ~/.claude/projects/<munged-cwd>/<session-id>.jsonl. Each line is a
    # JSON event; assistant messages carry `.message.usage`. Shape of the
    # output mirrors action.yaml's `token_usage` so downstream consumers
    # (review-reviewers' evidence gist, dashboards) don't need to branch
    # on harness.
    - name: Token usage
      if: always()
      id: tokens
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
      run: |
        # The agent ran as the sandbox user, so its session JSONL lives under
        # the sandbox home (created with restrictive perms). Make just the
        # session dir runner-readable (not the whole plugin tree under .claude),
        # then consolidate the sessions and PTY log into a runner-owned dir for
        # token parsing and the uploaded artifact.
        sudo chmod a+x "${AGENT_HOME:-/nonexistent}" "${AGENT_HOME:-/nonexistent}/.claude" 2>/dev/null || true
        sudo chmod -R a+rX "${AGENT_HOME:-/nonexistent}/.claude/projects" 2>/dev/null || true
        LOGS_DIR="$RUNNER_TEMP/tend-logs"
        mkdir -p "$LOGS_DIR"
        cp -a "${AGENT_HOME}/.claude/projects/." "$LOGS_DIR/" 2>/dev/null || true
        cp -a "${TEND_RUN_DIR}/tend-claude.log" "$LOGS_DIR/" 2>/dev/null || true

        # Everything in $LOGS_DIR is freshly populated by this run. Take all
        # of it — no `-newer` filter (an older filter once dropped a real
        # session because mtime ties were inconsistent).
        SESSIONS=$(find "$LOGS_DIR" -name '*.jsonl' 2>/dev/null | tr '\n' ' ')

        if [ -n "$SESSIONS" ]; then
          # `jq -s` slurps inputs from ALL files into ONE flat array of
          # events. Iterate once with `.[]`, not twice. (Smoke 4 caught
          # this — the double `.[]` errored "Cannot index string with
          # string", the `|| echo '{}'` swallowed it, and the step fell
          # through to zeros.)
          USAGE=$(jq -s -c --arg model "$MODEL" '
            def n: . // 0;
            [.[] | select(.message.usage)] as $msgs |
            {
              input_tokens:                ([$msgs[] | .message.usage.input_tokens? | n] | add // 0),
              output_tokens:               ([$msgs[] | .message.usage.output_tokens? | n] | add // 0),
              cache_creation_input_tokens: ([$msgs[] | .message.usage.cache_creation_input_tokens? | n] | add // 0),
              cache_read_input_tokens:     ([$msgs[] | .message.usage.cache_read_input_tokens? | n] | add // 0),
              turns:                       ([.[] | select(.type? == "assistant")] | length),
              model:                       $model,
              cost_usd:                    0
            }
          ' $SESSIONS 2>/dev/null || echo '{}')
        fi
        if [ -z "${USAGE:-}" ] || [ "$USAGE" = "{}" ]; then
          USAGE='{"input_tokens":0,"output_tokens":0,"cache_creation_input_tokens":0,"cache_read_input_tokens":0,"turns":0,"model":"'"$MODEL"'","cost_usd":0}'
        fi

        echo "$USAGE" > "$LOGS_DIR/token-usage.json"
        echo "usage=$(jq -c . <<< "$USAGE")" >> "$GITHUB_OUTPUT"

        jq -r '
          "## Token Usage (interactive)",
          "| Metric | Value |",
          "|--------|-------|",
          "| Input | \(.input_tokens) |",
          "| Output | \(.output_tokens) |",
          "| Cache creation | \(.cache_creation_input_tokens) |",
          "| Cache read | \(.cache_read_input_tokens) |",
          "| Turns | \(.turns) |",
          "| Model | \(.model) |",
          "",
          "*Cost is not computed under the interactive harness — usage funds from the OAuth-token subscription, not per-token API billing.*"
        ' <<< "$USAGE" >> "$GITHUB_STEP_SUMMARY"

    - name: Report failure
      if: failure() && steps.claude.outcome == 'failure'
      shell: bash
      run: |
        LABEL="tend-outage"
        TITLE="Bot temporarily unavailable"
        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

        REF=""
        if [ "$GITHUB_EVENT_NAME" = "pull_request_target" ] || [ "$GITHUB_EVENT_NAME" = "pull_request_review" ] || [ "$GITHUB_EVENT_NAME" = "pull_request_review_comment" ]; then
          PR_NUM=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          REF="#${PR_NUM}"
        elif [ "$GITHUB_EVENT_NAME" = "issues" ] || [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
          ISSUE_NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          REF="#${ISSUE_NUM}"
        elif [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
          REF="CI fix for workflow run"
        fi

        TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        gh label create "$LABEL" --description "Tracks bot outage incidents" --color "d93f0b" 2>/dev/null || true
        printf '%s\n\n%s\n%s\n%s\n\n%s\n' \
          "The bot failed to process a request. This issue tracks failures until the underlying cause is resolved." \
          "| When | Run | Trigger |" \
          "|------|-----|---------|" \
          "| ${TIMESTAMP} | [workflow run](${RUN_URL}) | ${REF:-N/A} |" \
          "This issue was created automatically. Close it once the outage is resolved." > /tmp/body.md

        sleep $((RANDOM % 30))
        EXISTING=$(gh issue list --label "$LABEL" --state open --json number --jq '.[0].number // empty')

        if [ -n "$EXISTING" ]; then
          printf 'Failed run at %s: [workflow run](%s)%s\n' \
            "$TIMESTAMP" "$RUN_URL" "${REF:+ (triggered by ${REF})}" > /tmp/comment.md
          gh issue comment "$EXISTING" -F /tmp/comment.md
        else
          gh issue create --title "$TITLE" --label "$LABEL" -F /tmp/body.md
        fi
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Compute artifact name
      if: always()
      id: artifact
      shell: bash
      run: |
        # Name the session log so a later run on the same thread finds it with
        # one `GET /actions/artifacts?name=...` call. The thread workflows are
        # single-job, so a thread run (issue/PR event) takes a constant
        # `-n<number>` name; the repo's shared issue/PR number space means one
        # number keys the thread across issue-comment and review events. Other
        # runs (schedule/workflow_run/dispatch), including matrixed ones, get
        # the per-job INVOCATION_ID suffix so legs don't collide. Matrixing a
        # thread workflow would collide two legs on the constant name and fail
        # loudly at upload.
        name_key=""
        if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
          num=$(jq -r '.issue.number // .pull_request.number // empty' "$GITHUB_EVENT_PATH")
          [ -n "$num" ] && name_key="-n${num}"
        fi
        [ -z "$name_key" ] && name_key="${INVOCATION_ID:+"-${INVOCATION_ID:0:8}"}"
        echo "name=claude-interactive-session-logs${name_key}" >> "$GITHUB_OUTPUT"

    - name: Upload session logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.artifact.outputs.name }}
        # The Token usage step consolidates the sandbox user's session JSONL,
        # token-usage.json, and the PTY log into this runner-owned dir.
        path: ${{ runner.temp }}/tend-logs/
        retention-days: 30
        if-no-files-found: warn
