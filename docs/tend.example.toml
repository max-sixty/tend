# # Configuration
#
# Place at `.config/tend.toml`. Regenerate workflows after editing:
#
#   uvx tend@latest init
#
# Only `bot_name` is required. Everything else has sensible defaults.

bot_name = "my-project-bot"

# ## Model
#
# Claude model to use for all workflows. Valid values: opus, sonnet, haiku.
# Defaults to opus.
#
# model = "opus"

# ## Protected branches
#
# The default branch is always protected. Additional branches (release tracks,
# major-version branches) can be listed here ‚Äî the bot cannot merge to any of
# them without human approval.
#
# protected_branches = ["v1", "v2"]

# ## Secrets
#
# Two repo secrets are required:
#
# | Secret                    | Value                                                       |
# |---------------------------|-------------------------------------------------------------|
# | `BOT_TOKEN`               | Bot account PAT (see scopes below)                          |
# | `CLAUDE_CODE_OAUTH_TOKEN` | Claude Code OAuth token (PKCE flow, not an API key)         |
#
# Classic PAT scopes: `repo`, `workflow`, `notifications`, `write:discussion`.
# `workflow` is required to push commits that modify `.github/workflows/` files.
#
# Fine-grained PAT permissions: `contents:write`, `pull-requests:write`,
# `issues:write`, `actions:write`, `workflows:write`, `discussions:write`,
# `notifications:read`.
#
# Override names if the repo uses different secret names:
#
# [secrets]
# bot_token = "MY_BOT_PAT"
# claude_token = "MY_CLAUDE_TOKEN"
#
# `tend check` flags repo-level secrets not in an explicit allowlist. Repos with
# additional legitimate secrets must list them:
#
# [secrets]
# allowed = ["CODECOV_TOKEN", "DEPLOY_KEY"]

# ## Setup steps
#
# Build tools, caches, and environment variables that run before Claude in every
# workflow. Three forms:
#
# - `uses` ‚Äî a GitHub Action (local composite or marketplace)
# - `run`  ‚Äî a shell command
# - `raw`  ‚Äî verbatim YAML (for actions needing `with:` parameters)

# [[setup]]
# uses = "astral-sh/setup-uv@v6"
#
# [[setup]]
# run = "echo CARGO_TERM_COLOR=always >> $GITHUB_ENV"
#
# [[setup]]
# raw = """
# - uses: Swatinem/rust-cache@v2
#   with:
#     save-if: false
# """
#
# For complex setups, a local composite action
# (`.github/actions/tend-setup/action.yaml`) referenced via `uses` is cleaner.

# ## Workflows
#
# All workflows are enabled by default except ci-fix (requires
# `watched_workflows`). Every workflow accepts these options:
#
# - `enabled` (bool)  ‚Äî disable with `enabled = false`
# - `prompt` (string) ‚Äî override the default skill invocation
#
# Scheduled workflows also accept `cron` to override their default schedule.
#
# [workflows.notifications]
# enabled = false

# ### review
#
# Triggers on PR open/update. Reviews for correctness, duplication, error paths.
# Monitors CI. Pushes mechanical fixes to bot-authored PRs.
#
# [workflows.review]
# prompt = "/my-custom-review {pr_number}"    # override default prompt

# ### mention
#
# Triggers on @bot mentions and review comments. Responds to requests in PR and
# issue conversations.

# ### triage
#
# Triggers on new issues. Classifies, checks for duplicates, reproduces bugs,
# attempts conservative fixes.

# ### ci-fix
#
# Triggers when a watched CI workflow fails on the default branch. Reads failure
# logs, identifies root cause, opens a fix PR.
#
# [workflows.ci-fix]
# watched_workflows = ["ci", "build"]         # required ‚Äî names of CI workflows to monitor
# branches = ["main", "v1"]                   # optional ‚Äî defaults to default branch only

# ### nightly
#
# Daily (default 06:17 UTC). Resolves conflicts on open PRs, reviews recent
# commits, surveys ~10 files for bugs and stale docs, closes resolved issues,
# regenerates tend workflow files.
#
# [workflows.nightly]
# cron = "0 8 * * *"                          # override schedule

# ### weekly
#
# Weekly (default Sunday 09:17 UTC). Reviews dependency PRs, auto-merges safe
# patch and minor updates.
#
# [workflows.weekly]
# cron = "0 10 * * 1"                         # override to Monday

# ### notifications
#
# Every 15 minutes. Polls GitHub notifications, responds to unhandled mentions,
# marks handled threads as read.

# ### review-runs
#
# Daily (default 07:47 UTC). Reviews recent CI runs for behavioral problems
# and proposes skill/config improvements.

# ## Workflow overrides (patching)
#
# Generated `tend-*.yaml` files are regenerated from this config on every
# `tend init`. Don't patch them directly ‚Äî edits will be clobbered. Use the
# built-in override mechanism instead. Two override points per workflow:
#
# - `workflow_extra` ‚Äî top-level workflow keys (e.g. `env:`)
# - `jobs.<job-name>` ‚Äî keys inside a named job (e.g. `if:`, `timeout-minutes`,
#   `runs-on`, `permissions`)
#
# Overrides use RFC 7396 JSON Merge Patch semantics: mappings deep-merge,
# scalars and lists replace, and `= nil` deletes a key. See DESIGN.md ¬ß
# "Extending generated workflows" for the full spec.
#
# ### Example: skip review on labeled PRs
#
# The review job's default `if:` is `github.event.pull_request.draft == false`.
# Replace the scalar to also skip PRs carrying a dismiss label (useful for
# silencing re-reviews on already-reviewed PRs). Because `if:` is a scalar,
# the override replaces the base ‚Äî include the existing draft check too.
#
# [workflows.review.jobs.review]
# if = "github.event.pull_request.draft == false && !contains(github.event.pull_request.labels.*.name, 'tend:dismissed')"
#
# ### Example: add a permission without losing the defaults
#
# Permissions is a mapping, so keys deep-merge ‚Äî existing permissions stay.
#
# [workflows.review.jobs.review.permissions]
# packages = "read"
#
# ### Example: top-level env var on one workflow
#
# [workflows.review.workflow_extra.env]
# MY_VAR = "hello"
