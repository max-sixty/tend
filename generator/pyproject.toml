[project]
name = "continuous"
version = "0.1.0"
description = "Generator for Claude-powered CI workflows"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
]

[project.scripts]
continuous = "continuous.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/continuous"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pyyaml>=6.0.3",
]
