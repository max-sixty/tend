name: Tend
description: >-
  An autonomous junior maintainer for GitHub repos, powered by Claude —
  reviews PRs, triages issues, fixes CI. Runs the official `claude` binary
  in headless print mode (`claude -p`) as a separate, non-sudo sandbox user
  behind a local credential-injecting proxy: the bot PAT and the Anthropic
  credential live only in the proxy, never in the agent's environment. This
  is tend's default, recommended Claude harness. `claude-interactive/action.yaml`
  is a PTY-supervised variant of the same binary; inputs mirror this action
  for swap-in parity, and the two share the proxy machinery under the
  top-level `proxy/` and the step scripts under `shared/steps/`.

inputs:
  github_token:
    required: true
    description: GitHub token for API access and pushing commits
  claude_code_oauth_token:
    required: false
    default: ""
    description: >-
      Claude Code OAuth token (Max/Team subscription, obtained via
      `claude setup-token`). One of claude_code_oauth_token or
      anthropic_api_key must be set.
  anthropic_api_key:
    required: false
    default: ""
    description: >-
      Anthropic API key from console.anthropic.com (billed per token).
      One of claude_code_oauth_token or anthropic_api_key must be set;
      claude_code_oauth_token takes precedence when both are present.
  bot_name:
    required: true
    description: GitHub username of the bot account
  prompt:
    required: true
    description: The prompt to send to Claude
  model:
    default: "opus"
    description: Claude model to use
  allowed_tools:
    default: "Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill"
    description: Comma-separated list of allowed tools
  system_prompt_append:
    default: ""
    description: >-
      Extra text appended to the computed system prompt. The base prompt
      is composed at runtime from `shared/system-prompt.md` (harness-neutral
      conduct, scope, and precedence rules) plus a Claude-specific
      skill-loading directive. Empty (default) uses just the base; a
      non-empty value is appended on top.
  show_full_output:
    default: "true"
    description: Include the rendered Claude transcript in the workflow step summary.
  claude_version:
    default: "2.1.207"
    description: >-
      Version of the `claude` binary to install via
      `https://claude.ai/install.sh`, pinned to a specific
      claude-code release. Kept in step with the interactive harness's pin.
  timeout_seconds:
    default: "10800"
    description: >-
      Maximum time the headless Claude run is allowed to take before the
      supervisor kills it. Defaults to 3 hours — long-running sessions
      (e.g. ci-fix stress-testing a flaky failure) routinely need more
      than an hour, and short tasks finish well before the cap regardless.
  mitmproxy_version:
    default: "12.2.1"
    description: >-
      Pinned `mitmproxy` version for the credential-injection proxy. Pinned
      so the uv download cache key is stable; bump to upgrade.
  sandbox_path:
    default: ""
    description: >-
      Newline-separated directories prepended to the sandbox agent's PATH,
      before the agent launches. A leading `~` expands to the sandbox home.
      Runner-side `setup:` steps can't reach the sandbox env; this can.
  sandbox_env:
    default: ""
    description: >-
      Newline-separated NAME=VALUE pairs added to the sandbox agent's launch
      environment. Reserved keys (proxy routing, CA trust, dummy credentials,
      PATH) are rejected — use `sandbox_path` to extend PATH.
  sandbox_setup:
    default: ""
    description: >-
      Shell commands run as the sandbox user after the toolchain and plugins
      install and before the agent runs, with the agent's launch env and the
      workspace as cwd. For on-disk setup (installing a tool, warming a cache);
      env-only tweaks don't persist — use sandbox_path/sandbox_env for those.

outputs:
  token_usage:
    description: >-
      JSON object with token usage: input_tokens, output_tokens,
      cache_creation_input_tokens, cache_read_input_tokens, turns,
      model, cost_usd
    value: ${{ steps.tokens.outputs.usage }}

runs:
  using: composite
  steps:
    # Shared step bodies live in the top-level shared/steps/ so the three
    # harness actions can't drift; each wrapper below passes inputs via env
    # and runs the script (reached via ../shared/steps, since this action is
    # one level deep). The two Claude actions are swap-in compatible — keep
    # their input surfaces in sync (enforced by the claude-action-input-parity
    # pre-commit hook).
    - name: Security preflight
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/security-preflight.sh"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Rate limit preflight
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/rate-limit-preflight.sh"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        BOT_NAME: ${{ inputs.bot_name }}

    - name: Resolve bot ID
      id: bot
      shell: bash
      run: echo "id=$(gh api users/${{ inputs.bot_name }} --jq '.id')" >> "$GITHUB_OUTPUT"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    # Secrets via env:, not ${{ }} interpolation — interpolating them into the
    # run: body would write their values into the rendered step script on disk.
    - name: Validate auth configured
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/validate-claude-auth.sh"
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}

    - name: Ensure uv is available
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/ensure-uv.sh"

    # Restore PR-authored sensitive config (.claude, CLAUDE.md, …) from the
    # reviewed base branch to close the startup-RCE surface. Runs before the
    # credential handoff — it needs the git credential actions/checkout
    # persisted, which setup-sandbox.sh strips. Full rationale in the script.
    - name: Restore sensitive config from base branch (PRs)
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/restore-sensitive-config.sh"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    # Compose the system prompt (shared/system-prompt.md + Claude directives +
    # the adopter's system_prompt_append). SYSTEM_PROMPT_FILE is passed in so
    # the script is path-agnostic; this action lives under claude/, so the
    # shared file is one level up.
    - name: Compose system prompt
      id: prompt
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/compose-system-prompt.sh"
      env:
        SYSTEM_PROMPT_FILE: ${{ github.action_path }}/../shared/system-prompt.md
        BOT_NAME: ${{ inputs.bot_name }}
        EXTRA: ${{ inputs.system_prompt_append }}

    # Credential isolation: run the agent as a separate, non-sudo
    # `tend-sandbox` user while the real secrets live only in a local mitmproxy
    # that injects them per-host. The agent holds only dummies:
    #   - GitHub PAT → injected for GitHub hosts; never in the agent's env, and
    #     not in .git/config (the setup script strips the credential
    #     `actions/checkout` persists there).
    #   - Anthropic OAuth/API key → injected for api.anthropic.com; the agent
    #     gets a dummy in the matching scheme so `claude` emits the right
    #     headers, and the proxy swaps in the real secret. So even the model
    #     auth never reaches the agent's env or disk.
    # The proxy machinery is shared with claude-interactive/action.yaml and
    # lives at the top-level proxy/ — reused in place, not duplicated.
    # ACTION_PATH points at the repo root so setup-sandbox.sh's
    # `${ACTION_PATH}/proxy/inject_credentials.py` resolves.
    # See ../proxy/setup-sandbox.sh and ../proxy/inject_credentials.py.
    #
    # Runs after "Restore sensitive config" (which needs the persisted git
    # credential for its base fetch) and before the claude lifecycle — install,
    # plugins, and the run all execute as the sandbox user. Cache the proxy's
    # mitmproxy download (a sizeable dependency) in an isolated uv cache dir,
    # keyed on the pinned version. First run populates; every run after restores
    # in seconds instead of a cold ~20s resolve. The agent's own uvx usage keeps
    # its default cache, untouched.
    - name: Cache mitmproxy
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/tend-mitmproxy-uv
        key: tend-mitmproxy-${{ runner.os }}-${{ inputs.mitmproxy_version }}

    - name: Set up credential-isolation sandbox
      shell: bash
      env:
        TEND_GH_TOKEN: ${{ inputs.github_token }}
        # The real Anthropic credential goes ONLY to the proxy (this runner-
        # owned step), never to the sandbox. The proxy injects it for
        # api.anthropic.com; the agent later gets a scheme-matched dummy.
        TEND_ANTHROPIC_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        TEND_ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        # Point ACTION_PATH at the repo root (one level up from this action's
        # claude/ dir) so the script's `${ACTION_PATH}/proxy/inject_credentials.py`
        # resolves to the shared proxy addon at the top-level proxy/.
        ACTION_PATH: ${{ github.action_path }}/..
        MITMPROXY_VERSION: ${{ inputs.mitmproxy_version }}
        UV_CACHE_DIR: ${{ runner.temp }}/tend-mitmproxy-uv
        # Adopter sandbox levers: PATH prepends and env additions, baked into
        # the agent env file. sandbox_setup (commands) runs in a later step.
        TEND_SANDBOX_PATH: ${{ inputs.sandbox_path }}
        TEND_SANDBOX_ENV: ${{ inputs.sandbox_env }}
      run: bash "${{ github.action_path }}/../proxy/setup-sandbox.sh"

    # Install the agent toolchain (uv + the claude binary) into the sandbox
    # user's home. SANDBOX/AGENT_HOME come from setup-sandbox.sh via $GITHUB_ENV.
    - name: Install agent toolchain (sandbox)
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/install-agent-toolchain.sh"
      env:
        CLAUDE_VERSION: ${{ inputs.claude_version }}

    # Install the tend plugins into the sandbox's own ~/.claude. MARKETPLACE_ROOT
    # is the dir holding .claude-plugin/ and plugins/; for this root action
    # that's the action checkout itself.
    - name: Install tend plugins (sandbox)
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/install-tend-plugins.sh"
      env:
        MARKETPLACE_ROOT: ${{ github.action_path }}/..

    # Run the adopter's `sandbox_setup:` commands inside the sandbox, as the
    # sandbox user, after the toolchain + plugins are in place and before the
    # agent launches. No-op when the input is empty.
    - name: Run adopter sandbox setup
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/sandbox-setup.sh"
      env:
        TEND_SANDBOX_SETUP: ${{ inputs.sandbox_setup }}

    # Run the agent headless. `claude -p` (print mode) runs one turn to
    # completion and exits — no Ink UI, no TTY, no first-run onboarding — so
    # completion is detected from the process exit code plus the final
    # `result` event (an error result fails the step), not a Stop-hook
    # sentinel. The wrapper keeps all argv/env quoting in bash, not nested
    # YAML strings.
    #   - settings.local.json sets `permissions.defaultMode: bypassPermissions`
    #     plus skipDangerousModePermissionPrompt. bypassPermissions lets the bot
    #     write Claude Code's protected paths (.devcontainer/, .github/, .husky/,
    #     .cargo/, dotfiles) that every other mode hard-denies — which blocked
    #     autonomous fixes. Safe here: the run is sandboxed and can only land via
    #     reviewed PRs. No Stop/StopFailure hooks — headless completion is the
    #     process exit.
    #     TODO: research a more hawkish posture that keeps this write capability —
    #     e.g. an auto-mode classifier, or scoped overrides of specific protected
    #     paths — without reintroducing hard blocks.
    #   - `--output-format stream-json --verbose` streams the SDK message events
    #     to stdout, ending in a `type: "result"` event carrying usage + cost.
    #     The Token usage step parses it.
    - name: Run Claude
      id: claude
      shell: bash
      env:
        # No real secrets here — the agent's launch env is $AGENT_ENV_FILE
        # (proxy routing, CA trust, dummy GitHub + Anthropic credentials,
        # CLAUDE_CODE_REMOTE for remote/non-interactive context). The proxy
        # injects the real credentials per-host.
        # The Linux bwrap wrapping path corrupts `!` to `\!` in Bash commands,
        # so the subprocess sandbox stays off (`0`). Reproduced through claude
        # 2.1.159; anthropics/claude-code#64301, write-up in #639. Off leaks
        # nothing: the agent's env holds only dummy secrets, and the proxy
        # injects the real ones per-host.
        CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "0"
        BOT_NAME: ${{ inputs.bot_name }}
        BOT_ID: ${{ steps.bot.outputs.id }}
        TEND_MODEL: ${{ inputs.model }}
        TEND_ALLOWED_TOOLS: ${{ inputs.allowed_tools }}
        TEND_SYSTEM_PROMPT: ${{ steps.prompt.outputs.value }}
        TEND_PROMPT: ${{ inputs.prompt }}
        TEND_TIMEOUT_SEC: ${{ inputs.timeout_seconds }}
      run: |
        set -u

        # The stream-json output and stderr go to runner-owned files: the
        # redirects are opened by this runner shell, and the sandbox process
        # writes through the inherited fds regardless of file ownership. The
        # wrapper lives in the sandbox-writable run dir ($TEND_RUN_DIR).
        STREAM_JSON="$RUNNER_TEMP/tend-stream.json"
        STDERR_LOG="$RUNNER_TEMP/tend-claude-stderr.log"
        WRAPPER="$TEND_RUN_DIR/tend-run-claude.sh"

        # Build the permissions allow list from the comma-separated
        # `allowed_tools` input. With defaultMode=bypassPermissions the allow
        # list is largely moot (every tool is permitted), but it's retained so
        # the listed tools stay granted via the layered settings if an adopter
        # overrides defaultMode to a stricter mode.
        ALLOW_JSON=$(jq -nc --arg list "$TEND_ALLOWED_TOOLS" '$list | split(",") | map(gsub("^\\s+|\\s+$"; ""))')

        # Build settings.local.json with jq, not a heredoc — jq escapes the
        # (adopter-controlled) tool list so nothing in it is re-expanded by the
        # shell. Written into the sandbox-owned workspace as the sandbox user;
        # the `< file` redirect is opened by the runner shell, so tee needs no
        # read access to the runner temp file. skipDangerousModePermissionPrompt
        # pre-accepts the one-time bypass-mode "I accept the risks" disclaimer —
        # the settings key the dialog's accept button writes, read from any
        # settings layer. No Stop/StopFailure hooks — headless detects
        # completion from the process exit plus the result-event verdict below.
        # attribution: {commit: "", pr: ""} empties Claude Code's auto-added
        # `Co-Authored-By: Claude` commit trailer and `Generated with Claude
        # Code` PR footer, so bot commits and PRs are attributed solely to the
        # tend bot. (`attribution` supersedes the deprecated `includeCoAuthoredBy`.)
        jq -nc --argjson allow "$ALLOW_JSON" \
          '{
            permissions: {defaultMode: "bypassPermissions", allow: $allow},
            skipDangerousModePermissionPrompt: true,
            attribution: {commit: "", pr: ""}
          }' > "$RUNNER_TEMP/tend-settings.json"
        sudo -u "$SANDBOX" mkdir -p "$GITHUB_WORKSPACE/.claude"
        sudo -u "$SANDBOX" tee "$GITHUB_WORKSPACE/.claude/settings.local.json" \
          < "$RUNNER_TEMP/tend-settings.json" >/dev/null

        # Wrapper script — keeps the argv quoting in bash, not YAML. The
        # --permission-mode flag matches settings.local.json above; either
        # alone would suffice but specifying both is explicit and survives
        # an adopter who overrides settings.local.json.
        cat > "$RUNNER_TEMP/tend-wrapper.sh" <<'WRAPEOF'
        #!/usr/bin/env bash
        exec claude -p \
          --model "$TEND_MODEL" \
          --permission-mode bypassPermissions \
          --allowedTools "$TEND_ALLOWED_TOOLS" \
          --append-system-prompt "$TEND_SYSTEM_PROMPT" \
          --output-format stream-json --verbose \
          "$TEND_PROMPT"
        WRAPEOF
        sudo -u "$SANDBOX" tee "$WRAPPER" < "$RUNNER_TEMP/tend-wrapper.sh" >/dev/null
        sudo -u "$SANDBOX" chmod +x "$WRAPPER"

        # Pass GITHUB_* through as a denylist rather than an explicit
        # allowlist: most GITHUB_* vars are informational (GITHUB_ACTOR,
        # GITHUB_API_URL, GITHUB_REF_NAME, GITHUB_WORKSPACE, …) and a
        # denylist picks up future additions automatically. Skills depend on
        # them for run-self-reference (branch names, gist headings, dedup of
        # own check runs) and owner-correct URL construction. Exclude:
        #   GITHUB_TOKEN — the agent env file carries a dummy; the real
        #     PAT lives in the proxy. (The file's dummy must not be
        #     overridden, so the denylist entry is load-bearing.)
        #   GITHUB_{ENV,PATH,OUTPUT,STATE,STEP_SUMMARY} — paths the
        #     runner re-reads after this step exits; the sandbox must not
        #     be handed a channel into later steps' env / PATH / outputs /
        #     job summary.
        GHA_VARS=()
        while IFS= read -r name; do
          case "$name" in
            GITHUB_TOKEN|GITHUB_ENV|GITHUB_PATH|GITHUB_OUTPUT|GITHUB_STATE|GITHUB_STEP_SUMMARY) continue ;;
          esac
          GHA_VARS+=("$name=${!name}")
        done < <(compgen -e | grep '^GITHUB_')

        # Launch the agent as the non-sudo sandbox user, backgrounded so the
        # runner can supervise it. Its launch env is $AGENT_ENV_FILE (written by
        # setup-sandbox.sh; shared with the plugin-install step so the two can't
        # drift): proxy routing, CA trust for every client family, and DUMMY
        # GitHub + Anthropic credentials in the production schemes — the proxy
        # replaces them with the real secrets for their hosts. Non-allowlisted
        # traffic tunnels through untouched. No real secret is in this env.
        #
        # The `sudo env VAR=...` form replaces the environment with only
        # what's listed, so the GITHUB_* context vars are re-passed via the
        # denylist above. They are public values, not secrets.
        mapfile -t AGENT_ENV <"$AGENT_ENV_FILE"
        sudo -u "$SANDBOX" env \
          "${AGENT_ENV[@]}" \
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB="$CLAUDE_CODE_SUBPROCESS_ENV_SCRUB" \
          BOT_NAME="$BOT_NAME" BOT_ID="$BOT_ID" \
          TEND_MODEL="$TEND_MODEL" TEND_ALLOWED_TOOLS="$TEND_ALLOWED_TOOLS" \
          TEND_SYSTEM_PROMPT="$TEND_SYSTEM_PROMPT" TEND_PROMPT="$TEND_PROMPT" \
          CI="${CI:-true}" \
          "${GHA_VARS[@]}" \
          bash "$WRAPPER" >"$STREAM_JSON" 2>"$STDERR_LOG" &
        CLAUDE_PID=$!
        echo "Claude PID: $CLAUDE_PID (running as $SANDBOX, headless claude -p)"

        # Supervisor poll loop: process exit or timeout, whichever comes first.
        # The agent tree runs as the sandbox user, so liveness/termination
        # signals from the runner cross the UID boundary and go through sudo.
        start=$(date +%s)
        status=running
        while true; do
          if ! sudo kill -0 "$CLAUDE_PID" 2>/dev/null; then
            status=exited
            break
          fi
          if [ $(($(date +%s) - start)) -ge "$TEND_TIMEOUT_SEC" ]; then
            status=timeout
            break
          fi
          sleep 2
        done

        # Clean termination — SIGTERM, wait up to 5s, then SIGKILL. Killing the
        # `sudo` PID may leave the agent tree (claude→node) orphaned since
        # SIGKILL can't be relayed, so also reap every process owned by the
        # dedicated sandbox user.
        if sudo kill -0 "$CLAUDE_PID" 2>/dev/null; then
          sudo kill -TERM "$CLAUDE_PID" 2>/dev/null || true
          for _ in 1 2 3 4 5; do
            sleep 1
            sudo kill -0 "$CLAUDE_PID" 2>/dev/null || break
          done
          sudo kill -KILL "$CLAUDE_PID" 2>/dev/null || true
        fi
        sudo pkill -KILL -u "$SANDBOX" 2>/dev/null || true

        # Capture the real exit, but NOT via `|| true` — that would make
        # CLAUDE_EXIT always 0 (the exit of `true`) and report a crashed run as
        # success. The process is dead by now, so wait returns promptly.
        CLAUDE_EXIT=0
        wait "$CLAUDE_PID" 2>/dev/null || CLAUDE_EXIT=$?

        elapsed=$(($(date +%s) - start))
        echo "Supervisor: status=$status elapsed=${elapsed}s claude_exit=$CLAUDE_EXIT"
        echo "status=$status" >> "$GITHUB_OUTPUT"
        echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"
        echo "stream_json=$STREAM_JSON" >> "$GITHUB_OUTPUT"

        # Render a readable transcript (assistant text + tool calls) from the
        # stream-json events, capped so a long session doesn't flood the summary.
        if [ "${{ inputs.show_full_output }}" = "true" ] && [ -s "$STREAM_JSON" ]; then
          {
            echo "## Claude transcript"
            echo
            echo '```'
            jq -r '
              select(.type == "assistant") | .message.content[]? |
              if .type == "text" then .text
              elif .type == "tool_use" then "→ \(.name): \((.input | tostring)[0:200])"
              else empty end
            ' "$STREAM_JSON" 2>/dev/null | head -400 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        case "$status" in
          exited)
            if [ "$CLAUDE_EXIT" -ne 0 ]; then
              echo "::error::claude -p exited non-zero (exit=$CLAUDE_EXIT) — see the session-logs artifact"
              tail -20 "$STDERR_LOG" 2>/dev/null || true
              exit "$CLAUDE_EXIT"
            fi
            # A 0 exit alone does NOT mean the turn succeeded: claude -p can exit
            # 0 while emitting an error `result` event (rate limit, max turns,
            # auth failure, or a failed final model request — `is_error: true`
            # can occur even on subtype "success"). Inspect the last result
            # event; this is the headless equivalent of the interactive
            # harness's StopFailure hook. A turn with no result event never
            # completed and is treated as failure (matching interactive's
            # exit-without-Stop-hook path), so the outage report fires and the
            # triggering notification is not marked read.
            VERDICT=$(jq -s -r '
              map(select(.type == "result")) | last
              | if . == null then "no-result"
                elif (.is_error == true) or (.subtype != "success") then "error:\(.subtype // "unknown")"
                else "ok" end
            ' "$STREAM_JSON" 2>/dev/null || echo "no-result")
            case "$VERDICT" in
              ok) exit 0 ;;
              no-result)
                echo "::error::claude -p produced no result event — the turn did not complete"
                tail -20 "$STDERR_LOG" 2>/dev/null || true
                exit 1
                ;;
              *)
                echo "::error::claude -p turn ended in failure (${VERDICT#error:}) — rate limit, auth, max turns, or server error"
                tail -20 "$STDERR_LOG" 2>/dev/null || true
                exit 1
                ;;
            esac
            ;;
          timeout)
            echo "::error::Claude headless run exceeded ${TEND_TIMEOUT_SEC}s timeout"
            exit 1
            ;;
        esac

    # The sandbox owned the workspace during the run. Hand it back to the runner
    # so actions/checkout's post-job credential cleanup — which runs as the
    # runner and writes .git/config — doesn't warn on dubious ownership /
    # permission. Always, so a failed run cleans up too: setup-sandbox.sh
    # exports SANDBOX before its first fallible step, so the guard holds even
    # when setup died mid-way (chown to self is an idempotent no-op if the
    # handoff never happened).
    - name: Restore workspace ownership for checkout cleanup
      if: always()
      shell: bash
      run: |
        if [ -n "${SANDBOX:-}" ]; then
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"
        fi

    - name: Mark event notification read
      if: success()
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/mark-notification-read.sh"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Append skill step summary
      if: always()
      shell: bash
      run: |
        if [ -f /tmp/claude/step-summary.md ]; then
          cat /tmp/claude/step-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
        fi

    # Parse the stream-json the headless run wrote to stdout. It is NDJSON (one
    # SDK message event per line) containing one or more `type: "result"`
    # events. Sessions that use `run_in_background: true` Bash emit a second
    # `result` on wakeup; `usage.*` and `num_turns` are per-event, while
    # `total_cost_usd` is cumulative. Sum the per-event fields across all
    # entries and take cost from the last. Output shape mirrors the interactive
    # harness so downstream consumers (review-reviewers' evidence gist,
    # token-report.sh, dashboards) don't branch on harness.
    - name: Token usage
      if: always()
      id: tokens
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        STREAM_JSON: ${{ steps.claude.outputs.stream_json }}
      run: |
        # Consolidate the agent's session JSONL (written under the sandbox home
        # with restrictive perms) and the stderr log into a runner-owned dir for
        # the uploaded artifact. Make just the session dir runner-readable (not
        # the whole plugin tree). The stream-json is parsed in place below and
        # copied into the dir only on tend's own repo.
        sudo chmod a+x "${AGENT_HOME:-/nonexistent}" "${AGENT_HOME:-/nonexistent}/.claude" 2>/dev/null || true
        sudo chmod -R a+rX "${AGENT_HOME:-/nonexistent}/.claude/projects" 2>/dev/null || true
        LOGS_DIR="$RUNNER_TEMP/tend-logs"
        mkdir -p "$LOGS_DIR"
        cp -a "${AGENT_HOME}/.claude/projects/." "$LOGS_DIR/" 2>/dev/null || true
        cp -a "$RUNNER_TEMP/tend-claude-stderr.log" "$LOGS_DIR/" 2>/dev/null || true

        if [ -n "${STREAM_JSON:-}" ] && [ -s "$STREAM_JSON" ]; then
          USAGE=$(jq -s -c --arg model "$MODEL" '
            (map(select(.type == "result"))) as $rs |
            if ($rs | length) == 0 then
              {input_tokens:0, output_tokens:0, cache_creation_input_tokens:0,
               cache_read_input_tokens:0, turns:0, model:$model, cost_usd:0}
            else
              ($rs | last) as $r |
              {
                input_tokens: ([$rs[].usage.input_tokens // 0] | add),
                output_tokens: ([$rs[].usage.output_tokens // 0] | add),
                cache_creation_input_tokens: ([$rs[].usage.cache_creation_input_tokens // 0] | add),
                cache_read_input_tokens: ([$rs[].usage.cache_read_input_tokens // 0] | add),
                turns: ([$rs[].num_turns // 0] | add),
                model: $model,
                cost_usd: (($r.total_cost_usd // 0) * 100 | round / 100)
              }
            end
          ' "$STREAM_JSON" 2>/dev/null || echo '')
        fi
        if [ -z "${USAGE:-}" ]; then
          USAGE='{"input_tokens":0,"output_tokens":0,"cache_creation_input_tokens":0,"cache_read_input_tokens":0,"turns":0,"model":"'"$MODEL"'","cost_usd":0}'
        fi

        echo "$USAGE" > "$LOGS_DIR/token-usage.json"
        echo "usage=$(jq -c . <<< "$USAGE")" >> "$GITHUB_OUTPUT"

        # Preserve the raw stream-json (the only place `type:"result"` cost
        # events live) alongside the session JSONL so token under-reporting
        # (#302) can be diagnosed against an actual stream. Gated to tend's own
        # repo so consumers don't pay for an upload that only serves a
        # tend-internal diagnostic. Drop once #302 is resolved.
        if [ "$GITHUB_REPOSITORY" = "max-sixty/tend" ] \
           && [ -n "${STREAM_JSON:-}" ] && [ -f "$STREAM_JSON" ]; then
          cp "$STREAM_JSON" "$LOGS_DIR/claude-stream.json" || true
        fi

        jq -r '
          def usd: tostring | if test("\\.") then split(".") | "\(.[0]).\((.[1] + "00")[:2])" else . + ".00" end | "$" + .;
          "## Token Usage",
          "| Metric | Value |",
          "|--------|-------|",
          "| Input | \(.input_tokens) |",
          "| Output | \(.output_tokens) |",
          "| Cache creation | \(.cache_creation_input_tokens) |",
          "| Cache read | \(.cache_read_input_tokens) |",
          "| Cost | \(.cost_usd | usd) |",
          "| Turns | \(.turns) |",
          "",
          "*Cost at API list prices — a large multiple of the effective rate on Claude Code subscriptions.*"
        ' <<< "$USAGE" >> "$GITHUB_STEP_SUMMARY"

    - name: Report failure
      if: failure() && steps.claude.outcome == 'failure'
      shell: bash
      run: bash "${{ github.action_path }}/../shared/steps/report-failure.sh"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Compute artifact name
      if: always()
      id: artifact
      shell: bash
      run: |
        # Name the session log so a later run on the same thread finds it with
        # one `GET /actions/artifacts?name=...` call. The thread workflows are
        # single-job, so a thread run (issue/PR event) takes a constant
        # `-n<number>` name; the repo's shared issue/PR number space means one
        # number keys the thread across issue-comment and review events. Other
        # runs (schedule/workflow_run/dispatch), including matrixed ones, get
        # the per-job INVOCATION_ID suffix so legs don't collide. Matrixing a
        # thread workflow would collide two legs on the constant name and fail
        # loudly at upload.
        name_key=""
        if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
          num=$(jq -r '.issue.number // .pull_request.number // empty' "$GITHUB_EVENT_PATH")
          [ -n "$num" ] && name_key="-n${num}"
        fi
        [ -z "$name_key" ] && name_key="${INVOCATION_ID:+"-${INVOCATION_ID:0:8}"}"
        echo "name=claude-session-logs${name_key}" >> "$GITHUB_OUTPUT"

    - name: Upload session logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.artifact.outputs.name }}
        # The Token usage step consolidates the sandbox user's session JSONL,
        # token-usage.json, the stderr log, and (on tend's own repo) the raw
        # stream-json into this runner-owned dir.
        path: ${{ runner.temp }}/tend-logs/
        retention-days: 30
        if-no-files-found: warn
