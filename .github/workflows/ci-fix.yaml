name: cd-ci-fix
# Reusable workflow for auto-fixing CI failures on the default branch.

on:
  workflow_call:
    inputs:
      bot_name:
        required: true
        type: string
      bot_id:
        required: true
        type: string
      run_id:
        required: true
        type: string
      run_url:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      commit_message:
        required: true
        type: string
      model:
        type: string
        default: "opus"
      allowed_tools:
        type: string
        default: "Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill"
      setup_command:
        type: string
        default: ""
      prompt:
        type: string
        default: ""
        description: "Custom CI fix prompt. Default uses /cd-ci-fix with run context."
      system_prompt_append:
        type: string
        default: "You are operating in a GitHub Actions CI environment. Use /cd-running-in-ci before starting work."
    secrets:
      bot_token:
        required: true
      claude_token:
        required: true

jobs:
  fix-ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.bot_token }}

      - name: Install CD skills and scripts
        uses: max-sixty/continuous@main

      - name: Project setup
        if: inputs.setup_command != ''
        shell: bash
        run: ${{ inputs.setup_command }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.claude_token }}
          github_token: ${{ secrets.bot_token }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          additional_permissions: |
            actions: read
          prompt: >-
            ${{ inputs.prompt != '' && inputs.prompt
              || format('/cd-ci-fix {0}
            - Run URL: {1}
            - Commit: {2}
            - Commit message: {3}',
                inputs.run_id, inputs.run_url, inputs.head_sha, inputs.commit_message
              ) }}
          claude_args: |
            --model ${{ inputs.model }}
            --allowedTools ${{ inputs.allowed_tools }}
            --append-system-prompt "${{ inputs.system_prompt_append }}"

      - name: Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
