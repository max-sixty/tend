name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: generator
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run pytest

  # Tests for the shared credential-injection proxy addon. Run standalone (no
  # project) with mitmproxy + pytest pulled in ad hoc, since the proxy isn't
  # part of the generator package.
  test-proxy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      # Pin to match the Claude actions' mitmproxy_version default so the
      # test exercises the same version the production proxy runs — the addon
      # imports mitmproxy.test (an internal helper), so version skew could green
      # the test while production breaks.
      - run: uv run --no-project --with 'mitmproxy==12.2.1' --with pytest pytest

  test-worker:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: pre-commit/action@v3.0.1
