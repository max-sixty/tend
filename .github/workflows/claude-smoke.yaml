name: claude-smoke

# Smoke test for the root `action.yaml` — the default headless `claude -p`
# harness that runs the official `claude` binary behind the
# credential-injecting proxy. Runs the in-tree action via `uses: ./` so we
# don't need a release tag (release tags are pinned to the generator's own
# version; the in-tree action is unreleased until the next `pypi-release`
# run).
#
# Manual only — dispatch it to validate the harness, e.g. on a branch that
# changes action.yaml or the shared proxy. The standard prompt lives in
# .github/claude-smoke-prompt.md; `-f prompt=` overrides it and `-f model=`
# picks the model.
#   gh workflow run claude-smoke.yaml --ref <branch> -f model=opus
#
# What we're validating:
#   1. `claude` binary installs cleanly on a fresh runner, as the sandbox user.
#   2. `claude plugin install` works non-interactively with the proxy's dummy
#      auth (no onboarding pre-seed — headless `-p` skips first-run onboarding).
#   3. `claude -p` runs a turn that uses a tool and exits 0 — the supervisor
#      detects completion from the process exit code (no Stop hook, no PTY).
#   4. Token usage (including cost) is parseable from the stream-json.
#   5. GitHub isolation: the agent runs as the tend-sandbox user with only a
#      dummy GitHub token, yet `gh api user` succeeds — proving the injecting
#      proxy attached the real PAT. A broken proxy would 401.
#   6. Anthropic isolation: the agent's env holds NO real Anthropic credential
#      — Claude Code strips its own auth vars from tool subprocesses (and the
#      agent's env carries only a dummy regardless), so the agent's step-4
#      check fails only on a non-empty value lacking the `tendproxydummy`
#      marker. That the session completes inference turns at all proves the
#      proxy injected the real secret for api.anthropic.com. A deterministic
#      post-run step greps the stream-json and hard-fails on a reported leak
#      or a missing verdict; it does not rely on a human reading the output.
#   7. The toolchain (uv + claude + plugins) installs and runs entirely as the
#      sandbox user — a failure here means the install-as-sandbox path broke.
#
# Supervisor outcomes (see Run Claude step in action.yaml):
#   exited (exit 0)   → turn completed cleanly
#   exited (exit N>0) → claude -p reported a failure
#   timeout           → exceeded timeout_seconds

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt override (blank = standard smoke prompt)
        required: false
        default: ""
      model:
        description: Claude model
        required: false
        default: sonnet
        type: choice
        options:
          - sonnet
          - haiku
          - opus

permissions:
  contents: read

jobs:
  smoke:
    # Fork guard: secrets aren't available to forks, so a fork dispatch would
    # fail noisily.
    if: github.repository_owner == 'max-sixty'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # Keep the DEFAULT persist-credentials: true so the smoke exercises
          # the production shape — checkout persists a git credential, and
          # setup-sandbox.sh must neutralize it. The git ls-remote step in the
          # prompt asserts the strip didn't break git.
          persist-credentials: true

      # Prompt source: a manual `-f prompt=` override, else the standard
      # isolation prompt checked in alongside this workflow.
      - name: Compose smoke prompt
        id: prompt
        env:
          OVERRIDE: ${{ inputs.prompt }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            PROMPT="$OVERRIDE"
          else
            PROMPT=$(cat .github/claude-smoke-prompt.md)
          fi
          {
            echo 'value<<SMOKE_EOF'
            printf '%s\n' "$PROMPT"
            echo 'SMOKE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run headless harness
        id: claude
        uses: ./
        with:
          github_token: ${{ secrets.TEND_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: tend-agent
          prompt: ${{ steps.prompt.outputs.value }}
          model: ${{ inputs.model }}
          # Short cap — the default prompt should finish in well under a
          # minute. Catching a hang here is part of the test.
          timeout_seconds: "300"

      # Deterministic isolation gate: the prompt's step-4 command echoes
      # "anthropic-cred: <verdict>" where verdict is isolated or REAL-LEAK.
      # The joined string appears literally only in runtime output (the
      # verdict is computed into $v), not in the command text, so grepping
      # the stream-json is unambiguous: `anthropic-cred:` is never immediately
      # followed by a literal verdict word anywhere in the command. Fail on a
      # reported leak, and fail if no verdict is present (agent skipped the
      # check, or a custom -f prompt= dropped it).
      - name: Assert credential isolation in transcript
        if: success()
        run: |
          STREAM="$RUNNER_TEMP/tend-stream.json"
          if [ ! -s "$STREAM" ]; then
            echo "::error::stream-json not found at $STREAM"
            exit 1
          fi
          if grep -qE 'anthropic-cred:[[:space:]]*REAL-LEAK' "$STREAM"; then
            echo "::error::Agent reported a REAL Anthropic credential reachable in the sandbox"
            exit 1
          fi
          if ! grep -qE 'anthropic-cred:[[:space:]]*isolated' "$STREAM"; then
            echo "::error::Transcript lacks an 'anthropic-cred: isolated' verdict — the isolation check did not run"
            exit 1
          fi
          echo "Credential isolation verified: no real Anthropic secret reachable by the agent"

      # The action exits non-zero on a failed/timed-out run, so a successful
      # job already implies the supervisor saw a clean exit. This step echoes
      # the parsed usage so the human reader can sanity-check turns > 0 (proves
      # the session actually ran end-to-end and we're not looking at a no-op).
      - name: Show token usage
        if: always()
        env:
          USAGE: ${{ steps.claude.outputs.token_usage }}
        run: |
          if [ -z "$USAGE" ]; then
            echo "::warning::token_usage output is empty — supervisor likely never reached the token-usage step"
            exit 0
          fi
          echo "$USAGE" | jq .
          TURNS=$(echo "$USAGE" | jq -r '.turns // 0')
          if [ "$TURNS" -eq 0 ]; then
            echo "::warning::token_usage reports 0 turns — session may not have completed any assistant response"
          fi
