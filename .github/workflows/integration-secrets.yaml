name: integration-secrets

# Reseeds the weekly integration-test fixture's secrets
# (tend-agent/tend-integration) from this repo's secrets.
#
# This cannot happen inside the weekly agent run: the interactive
# harness sandboxes the agent behind a credential-injecting proxy, so
# the agent's env holds a placeholder GitHub token and no Anthropic
# credential. Anything the agent exports (e.g. `gh secret set` into
# the fixture) stores the placeholder, not the real value. This
# workflow runs outside that sandbox, where `secrets.*` are real.
#
# The weekly integration-test recipe
# (.claude/skills/running-tend/references/integration-test.md, §1)
# dispatches it before driving the fixture; dispatch it manually after
# rotating either secret:
#   gh workflow run integration-secrets --repo max-sixty/tend

on:
  workflow_dispatch:

permissions: {}

jobs:
  reseed:
    if: github.repository_owner == 'max-sixty'
    runs-on: ubuntu-24.04
    steps:
      - name: Reseed tend-agent/tend-integration secrets
        # The bot PAT plays both roles: it authenticates the `gh secret
        # set` calls (the bot owns the fixture repo) and is itself the
        # value stored as TEND_BOT_TOKEN.
        env:
          GH_TOKEN: ${{ secrets.TEND_BOT_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # `gh secret set` accepts an empty body, so an unset source
          # secret would silently clobber the fixture. Fail fast instead.
          [ -n "$GH_TOKEN" ] || { echo "TEND_BOT_TOKEN is empty" >&2; exit 1; }
          [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ] || { echo "CLAUDE_CODE_OAUTH_TOKEN is empty" >&2; exit 1; }
          printf '%s' "$GH_TOKEN" \
            | gh secret set TEND_BOT_TOKEN --repo tend-agent/tend-integration
          printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN" \
            | gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo tend-agent/tend-integration
