name: cd-mention-comment
# Reusable workflow for handling issue_comment events (@bot mentions
# and bot-engaged conversations on issues and PRs).

on:
  workflow_call:
    inputs:
      bot_name:
        required: true
        type: string
      bot_id:
        required: true
        type: string
      comment_url:
        required: true
        type: string
      is_mention:
        required: true
        type: boolean
        description: "Whether the comment contains an @bot mention"
      is_pr:
        required: true
        type: boolean
        description: "Whether the comment is on a PR (vs plain issue)"
      issue_or_pr_number:
        required: true
        type: number
      model:
        type: string
        default: "opus"
      allowed_tools:
        type: string
        default: "Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill"
      setup_command:
        type: string
        default: ""
      allowed_non_write_users:
        type: string
        default: "*"
      system_prompt_append:
        type: string
        default: "You are operating in a GitHub Actions CI environment. Use /cd-running-in-ci before starting work."
    secrets:
      bot_token:
        required: true
      claude_token:
        required: true

jobs:
  mention:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.bot_token }}

      - name: Install CD skills and scripts
        uses: max-sixty/continuous@main

      - name: Project setup
        if: inputs.setup_command != ''
        shell: bash
        run: ${{ inputs.setup_command }}

      - name: Check out PR branch
        if: inputs.is_pr
        run: |
          PR_STATE=$(gh pr view ${{ inputs.issue_or_pr_number }} --json state --jq '.state')
          if [ "$PR_STATE" = "OPEN" ]; then
            gh pr checkout ${{ inputs.issue_or_pr_number }}
          else
            echo "::warning::PR is $PR_STATE — staying on default branch"
          fi
        env:
          GH_TOKEN: ${{ secrets.bot_token }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.claude_token }}
          github_token: ${{ secrets.bot_token }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          allowed_non_write_users: ${{ inputs.allowed_non_write_users }}
          additional_permissions: |
            actions: read
          prompt: >-
            ${{ inputs.is_mention
              && format(
                'You were mentioned in a comment ({0}). Read the full issue or PR (description, diff, recent comments, CI status) and respond. If they''re requesting changes, make the changes, commit, and push. If they''re asking a question, answer it.',
                inputs.comment_url
              )
              || format(
                'A user commented on an issue/PR where you previously participated ({0}). Read the full context (description, recent comments, CI status). Only respond if the comment is directed at you, asks a question you can help with, or requests changes you can make. If the conversation is between humans and doesn''t need your input, exit silently without commenting. Note: if you are the author of the PR or issue, commenters are probably expecting the author to engage — lean toward responding.',
                inputs.comment_url
              ) }}
          claude_args: |
            --model ${{ inputs.model }}
            --allowedTools ${{ inputs.allowed_tools }}
            --append-system-prompt "${{ inputs.system_prompt_append }}"

      - name: Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
