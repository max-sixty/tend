name: cd-review
# Reusable workflow for PR review. Callers handle trigger conditions
# and pass event context as inputs.

on:
  workflow_call:
    inputs:
      bot_name:
        required: true
        type: string
      bot_id:
        required: true
        type: string
      pr_number:
        required: true
        type: number
      event_name:
        required: true
        type: string
        description: "The caller's github.event_name (pull_request_target or pull_request_review)"
      model:
        type: string
        default: "opus"
      allowed_tools:
        type: string
        default: "Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill"
      setup_command:
        type: string
        default: ""
        description: "Shell command for project-specific setup (e.g., 'npm ci', 'pip install -e .')"
      review_prompt:
        type: string
        default: ""
        description: "Custom review prompt. Default uses /cd-review <pr_number>."
      review_url:
        type: string
        default: ""
        description: "URL of the review being responded to (github.event.review.html_url)"
      review_respond_prompt:
        type: string
        default: ""
        description: "Custom prompt for review responses. Default describes the review event."
      use_sticky_comment:
        type: boolean
        default: true
      allowed_bots:
        type: string
        default: "*"
      allowed_non_write_users:
        type: string
        default: "*"
      trigger_phrase:
        type: string
        default: ""
        description: "Bot trigger phrase (e.g., @my-bot). Empty disables."
      system_prompt_append:
        type: string
        default: "You are operating in a GitHub Actions CI environment. Use /cd-running-in-ci before starting work."
    secrets:
      bot_token:
        required: true
      claude_token:
        required: true

jobs:
  review:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout merge commit (initial review)
        if: inputs.event_name == 'pull_request_target'
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
          fetch-depth: 0
          token: ${{ secrets.bot_token }}

      - name: Checkout code (review response)
        if: inputs.event_name == 'pull_request_review'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.bot_token }}

      - name: Install CD skills and scripts
        uses: max-sixty/continuous@main

      # Project-specific setup (optional)
      - name: Project setup
        if: inputs.setup_command != ''
        shell: bash
        run: ${{ inputs.setup_command }}

      - name: Check out PR branch (review response)
        if: inputs.event_name == 'pull_request_review'
        run: gh pr checkout ${{ inputs.pr_number }}
        env:
          GH_TOKEN: ${{ secrets.bot_token }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.claude_token }}
          github_token: ${{ secrets.bot_token }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          allowed_bots: ${{ inputs.allowed_bots }}
          allowed_non_write_users: ${{ inputs.allowed_non_write_users }}
          trigger_phrase: ${{ inputs.trigger_phrase }}
          additional_permissions: |
            actions: read
          use_sticky_comment: ${{ inputs.event_name == 'pull_request_target' && inputs.use_sticky_comment }}
          prompt: >-
            ${{ inputs.event_name == 'pull_request_target'
              && (inputs.review_prompt != '' && inputs.review_prompt
                || format('/cd-review {0}', inputs.pr_number))
              || (inputs.review_respond_prompt != '' && inputs.review_respond_prompt
                || format(
                  'A review was submitted on your PR #{0} ({1}). Read the review and full PR context (description, diff, comments, CI status), then respond appropriately. If changes were requested, make them, commit, and push. If questions were asked, answer them.',
                  inputs.pr_number,
                  inputs.review_url
                )) }}
          claude_args: |
            --model ${{ inputs.model }}
            --allowedTools ${{ inputs.allowed_tools }}
            --append-system-prompt "${{ inputs.system_prompt_append }}"

      - name: Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
