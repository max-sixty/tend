name: Release to PyPI

on:
  push:
    tags: ["[0-9]*"]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository == 'max-sixty/tend'
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        working-directory: generator
        run: uv build

      - name: Check artifacts
        working-directory: generator
        run: |
          uv tool run --from twine twine check dist/*
          if [ -f dist/tend-0.0.0.tar.gz ]; then
            echo "Invalid version number"
            exit 1
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: generator/dist

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0

  github-release:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release from CHANGELOG section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Publish the tag's CHANGELOG section verbatim as the release notes.
          # Exact header match so 0.1.1 doesn't capture 0.1.10's section.
          awk -v ver="$GITHUB_REF_NAME" '
            $0 == "## " ver {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md > "$RUNNER_TEMP/notes.md"
          if [ ! -s "$RUNNER_TEMP/notes.md" ]; then
            echo "::error::No CHANGELOG.md section for $GITHUB_REF_NAME in the tagged commit. The tag is immutable, so re-running cannot fix this — add the section on main and run 'gh release create $GITHUB_REF_NAME' manually with the extracted notes."
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/notes.md" --verify-tag
