name: review-reviewers
# Hourly outcome-based analysis of bot behavior across adopter repos.
#
# Each matrix entry is a repo to analyze. The job checks out the tend repo
# (for creating improvement PRs/issues). TEND_BOT_TOKEN is sufficient for reading
# CI data from public adopter repos.
#
# TODO: Move repo list to a config file so adding a repo doesn't require a workflow change
# TODO: Cross-repo pattern detection — correlate findings across repos
on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  review-reviewers:
    strategy:
      fail-fast: false
      matrix:
        # Mirrors data/consumers.json. Keep in sync when a repo adopts tend.
        repo:
          - PRQL/prql
          - max-sixty/cargo-affected
          - max-sixty/tend
          - max-sixty/worktrunk
          - numbagg/numbagg
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TEND_BOT_TOKEN }}

      - uses: max-sixty/tend/codex@0.0.22
        with:
          github_token: ${{ secrets.TEND_BOT_TOKEN }}
          codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
          bot_name: tend-agent
          model: gpt-5.5
          prompt: $review-reviewers ${{ matrix.repo }}
