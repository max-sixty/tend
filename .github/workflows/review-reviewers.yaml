name: review-reviewers
# Hourly outcome-based analysis of bot behavior across adopter repos.
#
# Each matrix entry is a repo to analyze. The job checks out the tend repo
# (for creating improvement PRs/issues). BOT_TOKEN is sufficient for reading
# CI data from public adopter repos.
#
# TODO: Move repo list to a config file so adding a repo doesn't require a workflow change
# TODO: Cross-repo pattern detection — correlate findings across repos
on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  review-reviewers:
    strategy:
      fail-fast: false
      matrix:
        repo:
          - max-sixty/worktrunk
          - max-sixty/tend
          - PRQL/prql
    runs-on: ubuntu-24.04
    # Successful legs run 3–13 min (30-day p99 ≈ 10 min). Without a cap, an
    # `apt-get`/`curl` hang in the upstream `claude-code-action` setup step
    # burns the full 360-min GHA default — observed twice: 75 leg-min during
    # the 2026-05-02 azure-mirror DNS outage and 360 leg-min on 2026-05-13.
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.BOT_TOKEN }}

      - uses: max-sixty/tend@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: tend-agent
          prompt: /tend-ci-runner:review-reviewers ${{ matrix.repo }}
