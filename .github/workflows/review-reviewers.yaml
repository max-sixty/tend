name: review-reviewers
# Hourly outcome-based analysis of bot behavior across adopter repos.
#
# Each matrix entry is a repo to analyze. The job checks out the tend repo
# (for creating improvement PRs/issues). TEND_BOT_TOKEN is sufficient for reading
# CI data from public adopter repos.
#
# TODO: Move repo list to a config file so adding a repo doesn't require a workflow change
# TODO: Cross-repo pattern detection — correlate findings across repos
on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  # Create the monthly tracking issue before the matrix runs, so all matrix
  # legs find an existing issue instead of racing to create one. Without this,
  # the first cron tick of each new month produced N-1 duplicate tracking
  # issues (one per matrix leg that lost the find-or-create race).
  init-tracking:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - env:
          GH_TOKEN: ${{ secrets.TEND_BOT_TOKEN }}
        run: |
          MONTH=$(date -u +%Y-%m)
          LABEL="review-reviewers-tracking"
          NUM=$(gh issue list -R "$GITHUB_REPOSITORY" --state open --label "$LABEL" \
            --json number,title \
            --jq "[.[] | select(.title | contains(\"$MONTH\"))] | sort_by(.number) | .[0].number // empty")
          if [ -n "$NUM" ]; then
            echo "Tracking issue for $MONTH exists: #$NUM"
            exit 0
          fi
          cat > /tmp/body.md <<'EOF'
          Monthly tracking issue for `review-reviewers`. Per-target evidence lives in secret gists owned by the bot. A comment below is posted when each target's gist is first created.

          **Do not close manually** — a new issue is created each month.
          EOF
          gh issue create -R "$GITHUB_REPOSITORY" \
            --title "$LABEL: $MONTH" --label "$LABEL" -F /tmp/body.md

  review-reviewers:
    needs: init-tracking
    strategy:
      fail-fast: false
      matrix:
        # Mirrors data/consumers.json. Keep in sync when a repo adopts tend.
        repo:
          - PRQL/prql
          - max-sixty/cargo-affected
          - max-sixty/tend
          - max-sixty/worktrunk
          - numbagg/numbagg
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TEND_BOT_TOKEN }}

      - uses: max-sixty/tend/interactive@0.1.2
        with:
          github_token: ${{ secrets.TEND_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          bot_name: tend-agent
          model: opus
          prompt: |
            /tend-ci-runner:review-reviewers ${{ matrix.repo }}
