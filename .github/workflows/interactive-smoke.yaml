name: interactive-smoke

# Smoke test for `interactive/action.yaml` — the supervised-tmux/script
# alternative to the Agent-SDK-based claude-code-action wrapper. Runs the
# in-tree action via `uses: ./interactive` so we don't need a release tag
# (release tags are pinned to the generator's own version; the in-tree
# action is unreleased until the next `pypi-release` run).
#
# Trigger manually:
#   gh workflow run interactive-smoke.yaml --ref claude-p \
#     -f prompt="…"   # optional; default exercises Bash + Stop hook
#
# What we're validating:
#   1. `claude` binary installs cleanly on a fresh runner.
#   2. Workspace trust pre-seeding unblocks interactive startup.
#   3. `claude plugin install` works non-interactively with an
#      OAuth-token env var (the part the local spike could not cover).
#   4. The Stop hook fires after a turn that uses a tool, and the
#      supervisor exits 0.
#   5. Token usage is parseable from the session JSONL.
#   6. GitHub isolation: the agent runs as the tend-sandbox user with only a
#      dummy GitHub token, yet `gh api user` succeeds — proving the injecting
#      proxy attached the real PAT. A broken proxy would 401.
#   7. Anthropic isolation (phase 2): the agent's env holds only a DUMMY
#      Anthropic credential (it checks for the `tendproxydummy` marker and
#      that no other sk-ant value is present), yet the session completes
#      turns — proving the proxy injected the real Anthropic secret for
#      api.anthropic.com. A deterministic post-run step greps the PTY log
#      and hard-fails on a reported leak or a missing check line; the
#      assertion does not rely on a human reading the transcript.
#   8. The toolchain (uv + claude + plugins) installs and runs entirely as the
#      sandbox user — a failure here means the install-as-sandbox path broke.
#
# Failure modes the supervisor distinguishes (see Run Claude step in the
# action):
#   ok           → Stop hook fired, exit 0
#   stop-failure → StopFailure hook fired (rate limit / auth / server)
#   exited       → process died before either hook fired
#   timeout      → exceeded timeout_seconds

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to send to Claude
        required: false
        default: |
          You are running a smoke test of the interactive Claude harness.
          Do exactly the following and then stop, without asking any
          questions:

          1. Use the Bash tool to run: `pwd && date -u +%FT%TZ && uname -a`.
          2. Use the Bash tool to run: `gh api user --jq .login`. This goes
             through the credential-injecting proxy — it should print the bot
             account's login even though your environment only holds a dummy
             token.
          3. Use the Bash tool to run: `git ls-remote origin HEAD`. This must
             succeed (not fatal): it proves the persisted-credential strip
             didn't break git and that git reaches origin through the proxy.
          4. Use the Bash tool to run this exact script as ONE invocation. For
             each Anthropic credential variable it reports the state — unset /
             empty / dummy (carries the tendproxydummy marker) / OTHER (a
             NON-EMPTY value lacking the marker = a real-secret leak) — then a
             verdict. The real secret lives only in the proxy, so every set,
             non-empty variable must be the dummy; unset or empty is fine:

             v=dummy-isolated; seen=0
             for n in CLAUDE_CODE_OAUTH_TOKEN ANTHROPIC_API_KEY; do
               if ! val=$(printenv "$n"); then echo "envstate $n=unset"; continue; fi
               if [ -z "$val" ]; then echo "envstate $n=empty"; continue; fi
               if printf '%s' "$val" | grep -q tendproxydummy; then echo "envstate $n=dummy"; seen=1
               else echo "envstate $n=OTHER"; v=REAL-LEAK; fi
             done
             [ "$seen" = 1 ] || v=REAL-LEAK
             echo "anthropic-cred: $v"

             It must report dummy-isolated. That you can run this turn at all
             proves the proxy injected the real secret for inference.
          5. Reply with one line in the form:
             "Smoke test ran at <date>; gh authenticated as <login>; git ls-remote ok; <the anthropic-cred output line>".

          Do not push, comment, or modify files. Use only the Bash tool.
      model:
        description: Claude model
        required: false
        default: sonnet
        type: choice
        options:
          - sonnet
          - haiku
          - opus

permissions:
  contents: read

jobs:
  smoke:
    # Same fork-guard pattern as generated tend workflows — secrets are
    # not available on forks, so the run would fail noisily.
    if: github.repository_owner == 'max-sixty'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # Keep the DEFAULT persist-credentials: true so the smoke exercises
          # the production shape — checkout persists a git credential, and
          # setup-sandbox.sh must neutralize it. (An earlier cut set this to
          # false, which silently skipped the strip path; the git ls-remote
          # step in the prompt now asserts the strip didn't break git.)
          persist-credentials: true

      - name: Run interactive harness
        id: claude
        uses: ./interactive
        with:
          github_token: ${{ secrets.TEND_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: tend-agent
          prompt: ${{ inputs.prompt }}
          model: ${{ inputs.model }}
          # Short cap — the default prompt should finish in well under a
          # minute. Catching a hang here is part of the test.
          timeout_seconds: "300"

      # Deterministic isolation gate: the prompt's step-4 command echoes
      # "anthropic-cred: dummy-isolated" or "anthropic-cred: REAL-LEAK".
      # Neither full line appears literally in the command text (the value
      # is computed into $v), so grepping the PTY log is unambiguous. Fail
      # on a reported leak, and fail if the line is missing entirely (the
      # agent skipped the check, or a custom -f prompt= dropped it).
      - name: Assert credential isolation in transcript
        if: success()
        run: |
          LOG="$TEND_RUN_DIR/tend-claude.log"
          if [ ! -f "$LOG" ]; then
            echo "::error::PTY log not found at $LOG"
            exit 1
          fi
          CLEAN=$(sed 's/\x1b\[[0-9;?]*[a-zA-Z]//g' "$LOG" | tr -d '\r')
          if grep -q 'anthropic-cred: REAL-LEAK' <<<"$CLEAN"; then
            echo "::error::Agent reported a REAL Anthropic credential in its environment"
            exit 1
          fi
          if ! grep -q 'anthropic-cred: dummy-isolated' <<<"$CLEAN"; then
            echo "::error::Transcript lacks 'anthropic-cred: dummy-isolated' — the isolation check did not run"
            exit 1
          fi
          echo "Credential isolation verified: dummy-isolated"

      # The action exits non-zero on stop-failure / exited / timeout, so a
      # successful job already implies the supervisor saw a clean Stop. This
      # step just echoes the parsed usage so the human reader can sanity-
      # check turns > 0 (proves the session actually ran end-to-end and
      # we're not looking at a no-op).
      - name: Show token usage
        if: always()
        env:
          USAGE: ${{ steps.claude.outputs.token_usage }}
        run: |
          if [ -z "$USAGE" ]; then
            echo "::warning::token_usage output is empty — supervisor likely never reached the token-usage step"
            exit 0
          fi
          echo "$USAGE" | jq .
          TURNS=$(echo "$USAGE" | jq -r '.turns // 0')
          if [ "$TURNS" -eq 0 ]; then
            echo "::warning::token_usage reports 0 turns — session may not have completed any assistant response"
          fi
