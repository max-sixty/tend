name: codex-auth-refresh

# Reference implementation of the Codex OAuth-token refresher, linked from
# the install-tend skill's security-model.md for adopters to copy. tend's
# own harness is Claude, so this no longer runs on a schedule here — it is
# dispatch-only and kept solely as the canonical example.
#
# What it does: refresh the CODEX_AUTH_JSON secret by hitting OpenAI's
# OAuth token endpoint directly with the current refresh_token. Adopters
# on `harness: codex` run it nightly to decouple refresh from consumer
# workflows so they never trigger a rotation — they read an always-fresh
# secret and codex sees last_refresh < 8 days, so no proactive refresh
# fires inside the consumer runs. Without it the static secret breaks
# after ~8 days when the first consumer workflow triggers a refresh, the
# ephemeral runner discards the new tokens, and the GitHub secret still
# holds the rotated-out value.

on:
  # Adopters on `harness: codex`: uncomment to refresh nightly (the
  # security-model.md guidance assumes a scheduled run). Disabled here
  # because tend's own harness is Claude — this file is dispatch-only and
  # kept only as the reference implementation.
  # schedule:
  #   - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  refresh:
    if: github.repository_owner == 'max-sixty'
    runs-on: ubuntu-24.04
    environment: codex-auth-refresh
    permissions:
      contents: read
    steps:
      - name: Refresh CODEX_AUTH_JSON
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          GH_TOKEN: ${{ secrets.CODEX_REFRESH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "::error::CODEX_AUTH_JSON secret is unset"
            exit 1
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CODEX_REFRESH_PAT secret is unset — needs a PAT with secrets:write"
            exit 1
          fi

          REFRESH_TOKEN=$(printf '%s' "$CODEX_AUTH_JSON" | jq -r '.tokens.refresh_token')
          ACCOUNT_ID=$(printf '%s' "$CODEX_AUTH_JSON" | jq -r '.tokens.account_id')
          PRIOR_API_KEY=$(printf '%s' "$CODEX_AUTH_JSON" | jq -r '.OPENAI_API_KEY // empty')

          if [ -z "$REFRESH_TOKEN" ] || [ "$REFRESH_TOKEN" = "null" ]; then
            echo "::error::CODEX_AUTH_JSON is missing tokens.refresh_token"
            exit 1
          fi

          # Hit OpenAI's OAuth token endpoint. client_id is fixed for codex:
          # see https://github.com/openai/codex/blob/main/codex-rs/login/src/auth/manager.rs
          RESPONSE=$(curl -fsS -X POST https://auth.openai.com/oauth/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=$REFRESH_TOKEN" \
            --data-urlencode "client_id=app_EMoamEEZ73f0CkXaXp7hrann")

          if printf '%s' "$RESPONSE" | jq -e '.error' >/dev/null; then
            ERR=$(printf '%s' "$RESPONSE" | jq -r '.error_description // .error')
            echo "::error::OAuth refresh failed: $ERR"
            exit 1
          fi

          NOW=$(date -u +%Y-%m-%dT%H:%M:%S.%6NZ)

          NEW_AUTH=$(printf '%s' "$RESPONSE" | jq \
            --arg now "$NOW" \
            --arg account_id "$ACCOUNT_ID" \
            --arg api_key "$PRIOR_API_KEY" \
            '{
              OPENAI_API_KEY: (if $api_key == "" then null else $api_key end),
              auth_mode: "chatgpt",
              tokens: {
                access_token: .access_token,
                refresh_token: .refresh_token,
                id_token: .id_token,
                account_id: $account_id
              },
              last_refresh: $now
            }')

          # Sanity-check the new payload has the three rotated tokens
          for field in access_token refresh_token id_token; do
            VAL=$(printf '%s' "$NEW_AUTH" | jq -r ".tokens.$field")
            if [ -z "$VAL" ] || [ "$VAL" = "null" ]; then
              echo "::error::refreshed auth.json is missing tokens.$field"
              exit 1
            fi
          done

          # Repo secret, NOT --env: every consumer workflow (review,
          # mention, triage, nightly, …) reads CODEX_AUTH_JSON and none
          # declare this environment. Only CODEX_REFRESH_PAT is env-scoped.
          printf '%s' "$NEW_AUTH" | gh secret set CODEX_AUTH_JSON --repo "$REPO"

          EXP=$(printf '%s' "$NEW_AUTH" | jq -r '.tokens.access_token' \
            | awk -F. '{print $2}' \
            | { read -r t; pad=$(( (4 - ${#t} % 4) % 4 )); printf "%s%*s" "$t" "$pad" "" | tr ' ' '='; } \
            | base64 -d 2>/dev/null \
            | jq -r '.exp | todate' 2>/dev/null || echo "unknown")

          echo "Refresh complete."
          echo "  last_refresh: $NOW"
          echo "  access_token.exp: $EXP"
