name: cd-triage
# Reusable workflow for issue triage.

on:
  workflow_call:
    inputs:
      bot_name:
        required: true
        type: string
      bot_id:
        required: true
        type: string
      issue_number:
        required: true
        type: number
      model:
        type: string
        default: "opus"
      allowed_tools:
        type: string
        default: "Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill"
      setup_command:
        type: string
        default: ""
      allowed_non_write_users:
        type: string
        default: "*"
      prompt:
        type: string
        default: ""
        description: "Custom triage prompt. Default uses /cd-triage <issue_number>."
      system_prompt_append:
        type: string
        default: "You are operating in a GitHub Actions CI environment. Use /cd-running-in-ci before starting work."
    secrets:
      bot_token:
        required: true
      claude_token:
        required: true

jobs:
  triage:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.bot_token }}

      - name: Install CD skills and scripts
        uses: max-sixty/continuous@main

      - name: Project setup
        if: inputs.setup_command != ''
        shell: bash
        run: ${{ inputs.setup_command }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.claude_token }}
          github_token: ${{ secrets.bot_token }}
          bot_id: ${{ inputs.bot_id }}
          bot_name: ${{ inputs.bot_name }}
          allowed_non_write_users: ${{ inputs.allowed_non_write_users }}
          additional_permissions: |
            actions: read
          prompt: >-
            ${{ inputs.prompt != '' && inputs.prompt
              || format('/cd-triage {0}', inputs.issue_number) }}
          claude_args: |
            --model ${{ inputs.model }}
            --allowedTools ${{ inputs.allowed_tools }}
            --append-system-prompt "${{ inputs.system_prompt_append }}"

      - name: Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
