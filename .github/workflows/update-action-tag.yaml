name: Update action branch

on:
  push:
    branches: [main]

jobs:
  update-branch:
    runs-on: ubuntu-latest
    if: github.repository == 'max-sixty/tend'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update v1 branch to match main
        run: git push origin HEAD:refs/heads/v1
