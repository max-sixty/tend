name: website-data

# Refreshes activity.json + stats.json once a day and commits them to the
# `website` branch. The third feature, "currently tending", is served live
# by a Cloudflare Worker (see worker/) — not from a committed file.
#
# The `website` branch must exist (created by phase 1 — the Zola scaffold
# session). The fetcher writes into `static/data/` so Zola serves the files
# at `https://<pages-origin>/data/*.json` automatically.

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

jobs:
  fetch:
    if: github.repository_owner == 'max-sixty'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out scripts (default branch)
        uses: actions/checkout@v6
        with:
          path: scripts-checkout

      - name: Check out website branch
        uses: actions/checkout@v6
        with:
          ref: website
          path: website-checkout

      - name: Fetch data
        working-directory: website-checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 ../scripts-checkout/scripts/fetch_website_data.py

      - name: Commit if changed
        working-directory: website-checkout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/data/
          if git diff --staged --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "data: daily refresh"
          git push
