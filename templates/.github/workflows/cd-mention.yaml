# Handle @bot mentions and bot-engaged conversations. Copy to .github/workflows/
# and replace YOUR_BOT with your bot's GitHub username throughout.
name: cd-mention
on:
  issues:
    types: [edited]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]

jobs:
  verify:
    # Filter: @bot mentions, or non-bot comments
    if: |
      (github.event_name == 'issues' &&
        contains(github.event.issue.body, '@YOUR_BOT') &&
        github.event.issue.user.login != 'YOUR_BOT') ||
      (github.event_name == 'issue_comment' &&
        github.event.comment.user.login != 'YOUR_BOT') ||
      (github.event_name == 'pull_request_review_comment' &&
        github.event.comment.user.login != 'YOUR_BOT')
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Verify bot engagement
        id: check
        run: |
          # Mentions always run
          if [ "$EVENT_NAME" = "issues" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ -n "$COMMENT_BODY" ] && echo "$COMMENT_BODY" | grep -qF '@YOUR_BOT'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Non-mention: check if bot has engaged
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            NUMBER="${{ github.event.issue.number }}"
            if [ -z "${{ github.event.issue.pull_request.url }}" ]; then
              # Plain issue — check if bot authored or commented
              BOT_COMMENTS=$(gh api "repos/$GITHUB_REPOSITORY/issues/$NUMBER/comments" \
                --jq '[.[] | select(.user.login == "YOUR_BOT")] | length')
              if [ "$BOT_COMMENTS" -gt "0" ] || [ "${{ github.event.issue.user.login }}" = "YOUR_BOT" ]; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
              echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
          else
            NUMBER="${{ github.event.pull_request.number }}"
          fi

          # PR — check if bot authored, reviewed, or commented
          PR_AUTHOR=$(gh pr view "$NUMBER" --repo "$GITHUB_REPOSITORY" --json author --jq '.author.login')
          if [ "$PR_AUTHOR" = "YOUR_BOT" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BOT_REVIEWS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$NUMBER/reviews" \
            --jq '[.[] | select(.user.login == "YOUR_BOT")] | length')
          if [ "$BOT_REVIEWS" -gt "0" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BOT_COMMENTS=$(gh api "repos/$GITHUB_REPOSITORY/issues/$NUMBER/comments" \
            --jq '[.[] | select(.user.login == "YOUR_BOT")] | length')
          if [ "$BOT_COMMENTS" -gt "0" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "should_run=false" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}

      - name: React to mention
        if: |
          steps.check.outputs.should_run == 'true'
          && github.event.comment
          && contains(github.event.comment.body, '@YOUR_BOT')
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=eyes 2>/dev/null || \
          gh api "repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions" -f content=eyes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}

  comment:
    needs: verify
    if: needs.verify.outputs.should_run == 'true' && github.event_name == 'issue_comment'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: max-sixty/continuous/.github/workflows/mention-comment.yaml@main
    with:
      bot_name: YOUR_BOT
      bot_id: "YOUR_BOT_ID"
      comment_url: ${{ github.event.comment.html_url }}
      is_mention: ${{ contains(github.event.comment.body, '@YOUR_BOT') }}
      is_pr: ${{ github.event.issue.pull_request.url != '' }}
      issue_or_pr_number: ${{ github.event.issue.number }}
    secrets:
      bot_token: ${{ secrets.BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  review-comment:
    needs: verify
    if: needs.verify.outputs.should_run == 'true' && github.event_name == 'pull_request_review_comment'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: max-sixty/continuous/.github/workflows/mention-review.yaml@main
    with:
      bot_name: YOUR_BOT
      bot_id: "YOUR_BOT_ID"
      pr_number: ${{ github.event.pull_request.number }}
      comment_url: ${{ github.event.comment.html_url }}
      comment_id: ${{ github.event.comment.id }}
      is_mention: ${{ contains(github.event.comment.body, '@YOUR_BOT') }}
      repository: ${{ github.repository }}
    secrets:
      bot_token: ${{ secrets.BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  issue-edit:
    needs: verify
    if: needs.verify.outputs.should_run == 'true' && github.event_name == 'issues'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: max-sixty/continuous/.github/workflows/mention-issue-edit.yaml@main
    with:
      bot_name: YOUR_BOT
      bot_id: "YOUR_BOT_ID"
      issue_url: ${{ github.event.issue.html_url }}
      issue_number: ${{ github.event.issue.number }}
    secrets:
      bot_token: ${{ secrets.BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
