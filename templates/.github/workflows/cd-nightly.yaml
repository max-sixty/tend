# Nightly code quality sweep. Copy to .github/workflows/ and update bot
# identity, cron schedule, and secret names.
name: cd-nightly
on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  cleaner:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: max-sixty/continuous/.github/workflows/nightly.yaml@main
    with:
      bot_name: YOUR_BOT
      bot_id: "YOUR_BOT_ID"
    secrets:
      bot_token: ${{ secrets.BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
