# Automatic issue triage. Copy to .github/workflows/ and update bot_name,
# bot_id, and secret names.
name: cd-triage
on:
  issues:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    # Skip bot-created issues. Replace YOUR_BOT with your bot's GitHub username.
    if: >-
      github.event.issue.user.type != 'Bot' &&
      github.event.issue.user.login != 'YOUR_BOT'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: max-sixty/continuous/.github/workflows/triage.yaml@main
    with:
      bot_name: YOUR_BOT
      bot_id: "YOUR_BOT_ID"
      issue_number: ${{ github.event.issue.number }}
    secrets:
      bot_token: ${{ secrets.BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
