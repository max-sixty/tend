# Automatic PR review. Copy to .github/workflows/ and update bot_name, bot_id,
# and secret names.
name: cd-review
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]
  pull_request_review:
    types: [submitted]

jobs:
  review:
    # Skip draft PRs. For pull_request_review, only respond to reviews on
    # bot-authored PRs (non-bot reviewer, with body or non-approval).
    # Replace YOUR_BOT with your bot's GitHub username.
    if: |
      (github.event_name == 'pull_request_target' &&
        github.event.pull_request.draft == false) ||
      (github.event_name == 'pull_request_review' &&
        github.event.pull_request.user.login == 'YOUR_BOT' &&
        github.event.review.user.login != 'YOUR_BOT' &&
        (github.event.review.state != 'approved' || github.event.review.body))
    concurrency:
      group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: max-sixty/continuous/.github/workflows/review.yaml@main
    with:
      bot_name: YOUR_BOT
      bot_id: "YOUR_BOT_ID"
      pr_number: ${{ github.event.pull_request.number }}
      event_name: ${{ github.event_name }}
      trigger_phrase: "@YOUR_BOT"
      review_url: ${{ github.event.review.html_url }}
    secrets:
      bot_token: ${{ secrets.BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
