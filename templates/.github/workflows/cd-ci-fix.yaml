# Auto-fix CI failures on main. Copy to .github/workflows/ and update the
# workflow names, bot identity, and secret names.
name: cd-ci-fix
on:
  workflow_run:
    # List the workflow names that should trigger auto-fix on failure
    workflows: [ci]
    types: [completed]
    branches: [main]

jobs:
  fix-ci:
    if: github.event.workflow_run.conclusion == 'failure'
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    uses: max-sixty/continuous/.github/workflows/ci-fix.yaml@main
    with:
      bot_name: YOUR_BOT
      bot_id: "YOUR_BOT_ID"
      run_id: ${{ github.event.workflow_run.id }}
      run_url: ${{ github.event.workflow_run.html_url }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
      commit_message: ${{ github.event.workflow_run.head_commit.message }}
    secrets:
      bot_token: ${{ secrets.BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
