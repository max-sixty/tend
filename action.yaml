name: Tend
description: >-
  Claude-powered CI for GitHub repos. Loads CI skills via plugin,
  resolves bot identity, runs Claude Code, and uploads session logs.

inputs:
  github_token:
    required: true
    description: GitHub token for API access and pushing commits
  claude_code_oauth_token:
    required: true
    description: Claude Code OAuth token for Anthropic API
  bot_name:
    required: true
    description: GitHub username of the bot account
  prompt:
    required: true
    description: The prompt to send to Claude Code
  model:
    default: "opus"
    description: Claude model to use
  allowed_tools:
    default: "Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill"
    description: Comma-separated list of allowed tools
  system_prompt_append:
    default: "You are operating in a GitHub Actions CI environment. Use /tend-ci-runner:running-in-ci before starting work. Repo-specific guidance (running-tend skill, CLAUDE.md, .config/tend.toml) takes precedence; tend defaults apply where the repo doesn't specify. Conduct: follow the code of conduct; help anyone with problems they raise (issues, PRs, answers); actions affecting others' work (closing, locking, dismissing reviews, reverting, labeling) require the requester to be a maintainer (check author_association). Act within this repository and its organization only."
    description: Text appended to the system prompt
  allowed_bots:
    default: "*"
    description: Bots allowed to trigger workflows
  allowed_non_write_users:
    default: "*"
    description: Non-write users allowed to trigger workflows
  show_full_output:
    default: "true"
    description: Show full Claude output in workflow logs
  use_sticky_comment:
    default: "false"
    description: Use a sticky (updated) comment instead of new comments
  additional_permissions:
    default: "actions: read"
    description: Additional permissions for claude-code-action

outputs:
  token_usage:
    description: >-
      JSON object with token usage: input_tokens, output_tokens,
      cache_creation_input_tokens, cache_read_input_tokens, turns,
      model, cost_usd
    value: ${{ steps.tokens.outputs.usage }}

runs:
  using: composite
  steps:
    - name: Security preflight
      shell: bash
      run: |
        DEFAULT_BRANCH=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.default_branch')
        PROTECTED=$(gh api "repos/${GITHUB_REPOSITORY}/branches/${DEFAULT_BRANCH}" --jq '.protected')
        if [ "$PROTECTED" != "true" ]; then
          echo "::error::Default branch '${DEFAULT_BRANCH}' is NOT protected. Without branch protection, the bot can merge PRs without review. Add a branch protection rule or ruleset before using Tend. See docs/security-model.md in the Tend repo."
          exit 1
        fi
        echo "Security preflight passed: default branch '${DEFAULT_BRANCH}' is protected"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Rate limit preflight
      shell: bash
      run: |
        REPO="${GITHUB_REPOSITORY}"
        BOT="${{ inputs.bot_name }}"
        # GNU date — runs on Ubuntu (GitHub Actions runners)
        TWENTY_MIN_AGO=$(date -u -d '20 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
        TODAY=$(date -u +%Y-%m-%d)
        YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)
        SIX_DAYS_AGO=$(date -u -d '6 days ago' +%Y-%m-%d)

        # Burst check: too many in the last 20 minutes
        RECENT_PRS=$(gh api "repos/$REPO/pulls?state=all&sort=created&direction=desc&per_page=30" \
          --jq "[.[] | select(.user.login == \"$BOT\" and .created_at > \"$TWENTY_MIN_AGO\")] | length" || echo 0)
        RECENT_ISSUES=$(gh api "repos/$REPO/issues?creator=$BOT&state=all&sort=created&direction=desc&per_page=30" \
          --jq "[.[] | select(.pull_request == null and .created_at > \"$TWENTY_MIN_AGO\")] | length" || echo 0)

        # Spike check: abnormal daily volume vs 6-day baseline
        # search/issues covers both issues and PRs
        TODAY_POSTS=$(gh api "search/issues?q=author:${BOT}+repo:${REPO}+created:${TODAY}" \
          --jq '.total_count' || echo 0)
        PAST_POSTS=$(gh api "search/issues?q=author:${BOT}+repo:${REPO}+created:${SIX_DAYS_AGO}..${YESTERDAY}" \
          --jq '.total_count' || echo 0)
        # spike_limit = 10 + 2 * daily_avg = 10 + 2 * (past_posts / 6) = 10 + past_posts / 3
        SPIKE_LIMIT=$((10 + PAST_POSTS / 3))

        echo "Rate limit: burst=${RECENT_PRS} PRs, ${RECENT_ISSUES} issues (20min); today=${TODAY_POSTS} (limit: ${SPIKE_LIMIT})"

        ABORT=false
        if [ "$RECENT_PRS" -gt 10 ]; then
          echo "::error::Rate limit: bot created ${RECENT_PRS} PRs in the last 20 minutes (limit: 10)"
          ABORT=true
        fi
        if [ "$RECENT_ISSUES" -gt 10 ]; then
          echo "::error::Rate limit: bot created ${RECENT_ISSUES} issues in the last 20 minutes (limit: 10)"
          ABORT=true
        fi
        if [ "$TODAY_POSTS" -gt "$SPIKE_LIMIT" ]; then
          echo "::error::Rate limit: bot created ${TODAY_POSTS} items today, above spike limit of ${SPIKE_LIMIT} (baseline: ${PAST_POSTS} over past 6 days)"
          ABORT=true
        fi
        if [ "$ABORT" = true ]; then
          exit 1
        fi
        echo "Rate limit check passed"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Resolve bot ID
      id: bot
      shell: bash
      run: echo "id=$(gh api users/${{ inputs.bot_name }} --jq '.id')" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    # Ensure uv/uvx is on PATH for Claude sessions. The nightly skill runs
    # `uvx tend@latest init` to regenerate workflow files, and mention/review
    # skills may invoke tend as well. Adopters can override the workflow
    # `setup` step with their own composite action (e.g. one that installs
    # project toolchains) — if that custom setup doesn't install uv, the
    # Claude session won't have it. Install here as a no-op when already
    # present so tend's own skills always have a working uvx regardless of
    # how adopters customize their setup steps.
    - name: Ensure uv is available
      shell: bash
      run: |
        if command -v uvx >/dev/null 2>&1; then
          echo "uvx already available at $(command -v uvx)"
          exit 0
        fi
        echo "uvx not found; installing uv"
        curl -LsSf https://astral.sh/uv/install.sh | sh -s -- --quiet
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    # claude-code-action restores these from the base branch on all PRs
    # (RCE vectors — hooks, env vars, MCP servers):
    #   .claude/  .mcp.json  .claude.json  .gitmodules  .ripgreprc
    # It does NOT restore CLAUDE.md (prompt-injection, not RCE), so we
    # pin it ourselves for fork PRs.
    - name: Pin CLAUDE.md to base branch (fork PRs)
      shell: bash
      run: |
        if [ "$GITHUB_EVENT_NAME" != "pull_request_target" ]; then
          exit 0
        fi
        IS_FORK=$(jq -r '.pull_request.head.repo.fork // false' "$GITHUB_EVENT_PATH")
        if [ "$IS_FORK" != "true" ]; then
          exit 0
        fi
        DEFAULT_BRANCH=$(jq -r '.repository.default_branch' "$GITHUB_EVENT_PATH")
        if git show "origin/${DEFAULT_BRANCH}:CLAUDE.md" > /tmp/base-claude.md 2>/dev/null; then
          cp /tmp/base-claude.md CLAUDE.md
          echo "Pinned CLAUDE.md to ${DEFAULT_BRANCH}"
        else
          rm -f CLAUDE.md
          echo "No CLAUDE.md on ${DEFAULT_BRANCH} — removed fork version"
        fi

    - name: Run Claude Code
      id: claude
      uses: anthropics/claude-code-action@v1
      with:
        show_full_output: ${{ inputs.show_full_output }}
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ inputs.github_token }}
        bot_id: ${{ steps.bot.outputs.id }}
        bot_name: ${{ inputs.bot_name }}
        allowed_bots: ${{ inputs.allowed_bots }}
        allowed_non_write_users: ${{ inputs.allowed_non_write_users }}
        trigger_phrase: "@${{ inputs.bot_name }}"
        use_sticky_comment: ${{ inputs.use_sticky_comment }}
        additional_permissions: ${{ inputs.additional_permissions }}
        prompt: ${{ inputs.prompt }}
        plugin_marketplaces: https://github.com/max-sixty/tend.git
        plugins: |
          install-tend@tend
          tend-ci-runner@tend
        claude_args: |
          --model ${{ inputs.model }}
          --allowedTools ${{ inputs.allowed_tools }}
          --append-system-prompt "${{ inputs.system_prompt_append }}"

    - name: Mark event notification read
      if: success()
      shell: bash
      run: |
        # Mark the GitHub notification thread for the triggering event as read
        # so the scheduled tend-notifications poll doesn't burn tokens
        # rediscovering it. The thread is only marked when its updated_at
        # predates this run's start — newer activity stays unread for the next
        # workflow run to handle.
        case "$GITHUB_EVENT_NAME" in
          pull_request_target|pull_request_review|pull_request_review_comment)
            NUM=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
            SUBJECT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${NUM}"
            ;;
          issue_comment)
            # issue_comment fires for both issues AND PR conversation comments,
            # but PR notifications always use /pulls/N in subject.url. Detect
            # via the issue's pull_request field.
            NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            if [ "$(jq -r '.issue.pull_request.url // empty' "$GITHUB_EVENT_PATH")" != "" ]; then
              SUBJECT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${NUM}"
            else
              SUBJECT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${NUM}"
            fi
            ;;
          issues)
            NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            SUBJECT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${NUM}"
            ;;
          *)
            exit 0
            ;;
        esac

        RUN_STARTED_AT=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          --jq '.run_started_at')

        # Wrap in a subshell — a transient API error (non-JSON response)
        # must not fail the composite action.
        (gh api notifications \
          | jq -r --arg url "$SUBJECT_URL" --arg started "$RUN_STARTED_AT" \
              '.[] | select(.subject.url == $url and .updated_at <= $started) | .id' \
          | while read -r tid; do
              [ -n "$tid" ] || continue
              gh api "notifications/threads/$tid" -X PATCH || true
            done) || echo "::warning::Failed to mark notification as read (non-fatal)"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Token usage
      if: always()
      id: tokens
      shell: bash
      env:
        EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        MODEL: ${{ inputs.model }}
      run: |
        LOGS_DIR="/home/runner/.claude/projects"
        mkdir -p "$LOGS_DIR"

        # claude-code-action writes the full SDK message stream to
        # $RUNNER_TEMP/claude-execution-output.json and exposes the path as
        # its `execution_file` output. The array ends with a
        # `type: "result"` entry that carries total_cost_usd, num_turns,
        # and the per-session usage totals across all models — so cost
        # stays accurate regardless of which model the session used.
        if [ -n "$EXECUTION_FILE" ] && [ -f "$EXECUTION_FILE" ]; then
          USAGE=$(jq -c --arg model "$MODEL" '
            (map(select(.type == "result")) | last) as $r |
            if $r == null then
              {input_tokens:0, output_tokens:0, cache_creation_input_tokens:0,
               cache_read_input_tokens:0, turns:0, model:$model, cost_usd:0}
            else
              {
                input_tokens: ($r.usage.input_tokens // 0),
                output_tokens: ($r.usage.output_tokens // 0),
                cache_creation_input_tokens: ($r.usage.cache_creation_input_tokens // 0),
                cache_read_input_tokens: ($r.usage.cache_read_input_tokens // 0),
                turns: ($r.num_turns // 0),
                model: $model,
                cost_usd: (($r.total_cost_usd // 0) * 100 | round / 100)
              }
            end
          ' "$EXECUTION_FILE")
        else
          USAGE='{"input_tokens":0,"output_tokens":0,"cache_creation_input_tokens":0,"cache_read_input_tokens":0,"turns":0,"model":"'"$MODEL"'","cost_usd":0}'
        fi

        echo "$USAGE" > "$LOGS_DIR/token-usage.json"
        echo "usage=$(jq -c . <<< "$USAGE")" >> "$GITHUB_OUTPUT"

        jq -r '
          def usd: tostring | if test("\\.") then split(".") | "\(.[0]).\((.[1] + "00")[:2])" else . + ".00" end | "$" + .;
          "## Token Usage",
          "| Metric | Value |",
          "|--------|-------|",
          "| Input | \(.input_tokens) |",
          "| Output | \(.output_tokens) |",
          "| Cache creation | \(.cache_creation_input_tokens) |",
          "| Cache read | \(.cache_read_input_tokens) |",
          "| Cost | \(.cost_usd | usd) |",
          "| Turns | \(.turns) |",
          "",
          "*Cost at API list prices — a large multiple of the effective rate on Claude Code subscriptions.*"
        ' <<< "$USAGE" >> "$GITHUB_STEP_SUMMARY"

    - name: Report failure
      if: failure() && steps.claude.outcome == 'failure'
      shell: bash
      run: |
        LABEL="tend-outage"
        TITLE="Bot temporarily unavailable"
        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

        # Build a one-line reference to the triggering context
        REF=""
        if [ "$GITHUB_EVENT_NAME" = "pull_request_target" ] || [ "$GITHUB_EVENT_NAME" = "pull_request_review" ] || [ "$GITHUB_EVENT_NAME" = "pull_request_review_comment" ]; then
          PR_NUM=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          REF="#${PR_NUM}"
        elif [ "$GITHUB_EVENT_NAME" = "issues" ] || [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
          ISSUE_NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          REF="#${ISSUE_NUM}"
        elif [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
          REF="CI fix for workflow run"
        fi

        TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        # Fetch error annotations from the current job.
        # Sleep briefly — GitHub indexes ##[error] annotations asynchronously
        # and they may not be available via the API immediately after the step
        # fails. Also match both in_progress (normal) and failure (if GitHub
        # already transitioned the status) to handle matrix timing.
        sleep 5
        ERRORS=""
        JOB_ID=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" \
          --jq '[.jobs[] | select(.status == "in_progress" or .conclusion == "failure")] | first | .id' 2>/dev/null || true)
        if [ -n "$JOB_ID" ] && [ "$JOB_ID" != "null" ]; then
          ERRORS=$(gh api "repos/${GITHUB_REPOSITORY}/check-runs/${JOB_ID}/annotations" \
            --jq '[.[] | select(.annotation_level == "failure") | .message | select(test("^Process completed") | not)] | join("\n")' 2>/dev/null || true)
        fi

        ERROR_BLOCK=""
        if [ -n "$ERRORS" ]; then
          printf -v ERROR_BLOCK '\n<details><summary>Error details</summary>\n\n```\n%s\n```\n\n</details>\n' "$ERRORS"
        fi

        # Prepare issue body before the check so the TOCTOU window is minimal
        gh label create "$LABEL" --description "Tracks bot outage incidents" --color "d93f0b" 2>/dev/null || true
        printf '%s\n\n%s\n%s\n%s\n%s\n%s\n' \
          "The bot failed to process a request. This issue tracks failures until the underlying cause is resolved." \
          "| When | Run | Trigger |" \
          "|------|-----|---------|" \
          "| ${TIMESTAMP} | [workflow run](${RUN_URL}) | ${REF:-N/A} |" \
          "$ERROR_BLOCK" \
          "This issue was created automatically. Close it once the outage is resolved." > /tmp/body.md

        # Check-then-act with minimal gap
        EXISTING=$(gh issue list --label "$LABEL" --state open --json number --jq '.[0].number // empty')

        if [ -n "$EXISTING" ]; then
          printf 'Failed run at %s: [workflow run](%s)%s\n%s\n' \
            "$TIMESTAMP" "$RUN_URL" "${REF:+ (triggered by ${REF})}" "$ERROR_BLOCK" > /tmp/comment.md
          gh issue comment "$EXISTING" -F /tmp/comment.md
        else
          gh issue create --title "$TITLE" --label "$LABEL" -F /tmp/body.md
        fi
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Compute artifact name
      if: always()
      id: artifact
      shell: bash
      run: |
        # Use INVOCATION_ID (unique per job in matrix workflows) to avoid
        # artifact name collisions when the action runs in multiple matrix jobs
        suffix="${INVOCATION_ID:+"-${INVOCATION_ID:0:8}"}"
        echo "name=claude-session-logs${suffix}" >> "$GITHUB_OUTPUT"

    - name: Upload session logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.artifact.outputs.name }}
        path: /home/runner/.claude/projects/
        retention-days: 30
        if-no-files-found: warn
